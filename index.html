<script>
/* ===================== CONFIG ===================== */
// Default sheet used on first load (the last-loaded sheet is remembered locally).
const DEMO = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQLcZzzLn04LIt9xnaa43mMZyt1xUiisn2SzZ8Zbo1QeWnhyB1roNjwqw0EG9hvMwGGDYurUSwK5Oxv/pubhtml?gid=0&single=true";
const EPS = 0.005;          // net-zero tolerance (< 1 cent)
const STORE_KEY = 'iou_db'; // remembers the last sheet URL across reloads
const PALETTE = d3.schemeTableau10;   // categorical colors for names
const MAX_EXACT_N = 15;     // exact partition DP up to this many active people
const MAX_TREE_S  = 8;      // exact spanning-tree search up to this group size

/* ===================== URL / DATA HELPERS ===================== */
// Turn a published "pubhtml" URL into a CSV endpoint (served with permissive CORS).
function toCsvUrl(u){
  try{
    const url = new URL(u);
    const path = url.pathname.replace(/\/pubhtml\/?$/, '/pub').replace(/\/pub\/?$/, '/pub');
    const gid = url.searchParams.get('gid') || '0';
    return `${url.origin}${path}?gid=${gid}&single=true&output=csv`;
  }catch(e){ return u; }
}

// Fetch the published sheet as CSV text. Google serves the CSV with
// `Access-Control-Allow-Origin: *`, so a direct browser fetch works — BUT only
// from a real origin. Opening this file via file:// gives an opaque (null) origin
// and browsers block the request ("Failed to fetch"); serve over http(s) instead.
async function fetchSheetCsv(csvUrl){
  const r = await fetch(csvUrl, { redirect: 'follow' });
  if(!r.ok) throw new Error('HTTP ' + r.status);
  return await r.text();
}

// Best-effort: read the sheet's name from the pubhtml page's <title>. The CSV
// endpoint has no title, so this is a separate fetch that may be CORS-blocked —
// on any failure we just keep the default heading.
function setTitle(name){
  // heading shows the sheet name; the document <title> stays "Group IOU"
  document.getElementById('appTitle').textContent = (name || '').trim() || 'Group IOU';
}
async function fetchSheetTitle(pubUrl){
  try{
    const r = await fetch(pubUrl, { redirect: 'follow' });
    if(!r.ok) return null;
    const html = await r.text();
    const m = html.match(/<title[^>]*>([\s\S]*?)<\/title>/i);
    if(!m) return null;
    const ta = document.createElement('textarea');     // decode HTML entities
    ta.innerHTML = m[1];
    return ta.value.replace(/\s*[-–—]\s*Google (Drive|Sheets)\s*$/i, '').trim() || null;
  }catch(e){ return null; }
}

function parseAmount(s){
  if(typeof s === 'number') return s;
  if(s == null) return NaN;
  s = String(s).trim();
  if(!s) return NaN;
  let neg = false;
  if(/^\(.*\)$/.test(s)){ neg = true; s = s.slice(1, -1); }   // (123) => negative
  s = s.replace(/[$,\s]/g, '');
  if(s.startsWith('-')){ neg = true; s = s.slice(1); }
  if(s.startsWith('+')) s = s.slice(1);
  const v = parseFloat(s);
  if(isNaN(v)) return NaN;
  return neg ? -v : v;
}

const round2 = v => Math.round(v * 100) / 100;
function money(v){
  v = round2(v);
  const a = Math.abs(v);
  const s = Number.isInteger(a) ? String(a) : a.toFixed(2);
  return (v < 0 ? '-$' : '$') + s;
}
// whole-dollar display (matches the spreadsheet style) but keeps sign
function moneyWhole(v){
  const r = Math.round(v);
  return (r < 0 ? '-$' : '$') + Math.abs(r);
}

// The "pot" = total money that changed hands = sum of the positive balances
// (equals the sum of |negative| balances since the column nets to 0). Used to pick
// emoji tiers by % of the pot, so they scale regardless of the stakes.
const totalPot = () => people.reduce((s, p) => s + (p.balance > 0 ? p.balance : 0), 0);

// Reaction emojis for a graph node. A person can get up to two: a rank emoji
// (winner / 2nd / last) plus a magnitude emoji. The magnitude tier is chosen by the
// balance as a % of the pot (so it scales regardless of stakes). rank is the
// 0-based index in the descending-by-balance list; count is the number of people.
function emojiFor(balance, pot, rank, count){
  let e = '';
  if(count >= 2 && rank === 0) e += '👑';                 // winner
  else if(count >= 3 && rank === 1) e += '🥈';            // runner-up
  if(count >= 2 && rank === count - 1) e += '💩';         // last place
  if(Math.abs(balance) <= EPS) return e + '👻';           // exact $0 (present, evened out)
  const pct = pot ? Math.abs(balance) / pot * 100 : 0;    // magnitude tiers, % of pot
  if(pct < 5) e += '🤷';                                  // near-even (nonzero, either sign)
  else if(balance > 0) e += pct < 15 ? '😅' : pct < 30 ? '😁' : pct < 50 ? '🥳' : '🍾';
  else                 e += pct < 15 ? '😓' : pct < 30 ? '😫' : pct < 50 ? '😭' : '😱';
  return e;
}

function colorFor(i){
  if(i < PALETTE.length) return PALETTE[i];
  return d3.hsl((i * 137.508) % 360, 0.62, 0.55).formatHex();
}
function textOn(bg){
  const c = d3.color(bg).rgb();
  const lum = (0.299*c.r + 0.587*c.g + 0.114*c.b) / 255;
  return lum > 0.6 ? '#111111' : '#ffffff';
}
const esc = s => String(s).replace(/\\/g,'\\\\').replace(/"/g,'\\"');

/* ===================== SETTLEMENT ALGORITHM ===================== */
// people: [{name, balance, idx}] -> returns {transfers:[{from,to,amount}], exact:bool}
//
// We pick the settlement graph by three constraints, applied strictly in order:
//
//   Constraint 1 — fewest edges (fewest transfers).
//     = n - (max number of disjoint zero-sum subgroups), via the bitmask DP in
//       maxZeroSumPartition. Each atomic subgroup then settles as a spanning tree
//       (exactly size-1 edges), and each tree edge's amount + direction is fully
//       determined by its subtree balance sum.
//
//   Constraint 2 — among all graphs meeting Constraint 1, the fewest "proxy" nodes,
//     i.e. nodes that have both an incoming and an outgoing edge. We prefer
//     {A->B; A->C} over {A->B->C}: in the chain, B just proxies A's money to C, so
//     we'd rather A make 2 direct transfers than route through an intermediary.
//     (Counting proxies, not senders, also rules out debtor proxies like A->B->C
//     where B is itself a debtor.)
//
//   Constraint 3 — among all graphs meeting Constraints 1 and 2, the one that
//     maximizes the smallest transfer (avoid needless tiny payments).
//
// Constraints 2 and 3 are optimized in bestSpanningTree by enumerating every
// spanning tree of each subgroup and selecting lexicographically: fewest proxy
// nodes, then largest minimum edge.
function computeTransfers(people){
  const active = people.filter(p => Math.abs(p.balance) > EPS);
  const n = active.length;
  if(n === 0) return { transfers: [], exact: true };

  let groups, exact = true;
  if(n <= MAX_EXACT_N){
    groups = maxZeroSumPartition(active);
  }else{
    exact = false;
    groups = [active.slice()];   // treat as one group; greedy tree below
  }

  const transfers = [];
  for(const g of groups){
    if(g.length <= 1) continue;
    const tree = (g.length <= MAX_TREE_S) ? bestSpanningTree(g) : greedyTree(g);
    for(const t of tree) transfers.push(t);
  }
  // largest transfers first for a tidy display
  transfers.sort((a,b) => b.amount - a.amount);
  return { transfers, exact };
}

// Bitmask DP: partition into the max number of zero-sum subsets. Returns array of groups.
function maxZeroSumPartition(active){
  const n = active.length;
  const bal = active.map(p => p.balance);
  const full = (1 << n) - 1;
  const sum = new Float64Array(1 << n);
  for(let mask = 1; mask <= full; mask++){
    const low = mask & (-mask);
    const i = Math.log2(low) | 0;
    sum[mask] = sum[mask ^ low] + bal[i];
  }
  const isZero = mask => mask !== 0 && Math.abs(sum[mask]) <= EPS;

  const best = new Int32Array(1 << n).fill(-1);
  const choice = new Int32Array(1 << n);
  best[0] = 0;
  for(let mask = 1; mask <= full; mask++){
    const low = mask & (-mask);
    // enumerate submasks of `mask` that contain the lowest set bit (counts each partition once)
    for(let sub = mask; sub > 0; sub = (sub - 1) & mask){
      if(!(sub & low)) continue;
      if(!isZero(sub)) continue;
      const rest = mask ^ sub;
      if(best[rest] < 0) continue;
      if(1 + best[rest] > best[mask]){ best[mask] = 1 + best[rest]; choice[mask] = sub; }
    }
  }

  const groups = [];
  let mask = full;
  while(mask){
    const sub = choice[mask];
    const g = [];
    for(let i = 0; i < n; i++) if(sub & (1 << i)) g.push(active[i]);
    groups.push(g);
    mask ^= sub;
  }
  return groups;
}

// All labeled spanning trees of a group via Prüfer sequences. Edge amounts are
// determined by subtree balance sums; pick the best tree per Constraints 2 then 3.
function bestSpanningTree(g){
  const s = g.length;
  if(s === 2) return treeEdges(g, [[0,1]]);
  // Among all spanning trees (all minimal settlements), pick the best by, in order:
  //   Constraint 2: fewest proxy nodes (both an incoming and an outgoing edge), then
  //   Constraint 3: largest minimum transfer.
  let best = null;
  const seq = new Array(s - 2).fill(0);
  const total = Math.pow(s, s - 2);
  for(let k = 0; k < total; k++){
    // decode k -> base-s Prüfer sequence
    let x = k;
    for(let j = 0; j < s - 2; j++){ seq[j] = x % s; x = (x / s) | 0; }
    const edges = pruferToEdges(seq, s);
    const cand = treeAmounts(g, edges);
    if(!best ||
       cand.proxies < best.proxies ||
       (cand.proxies === best.proxies && cand.minAmt > best.minAmt)){
      best = cand;
    }
  }
  return best.detailed;
}

function pruferToEdges(seq, s){
  const degree = new Array(s).fill(1);
  for(const v of seq) degree[v]++;
  const edges = [];
  for(const v of seq){
    let leaf = -1;
    for(let i = 0; i < s; i++) if(degree[i] === 1){ leaf = i; break; }
    edges.push([leaf, v]); degree[leaf]--; degree[v]--;
  }
  let u = -1;
  for(let i = 0; i < s; i++) if(degree[i] === 1){ if(u < 0) u = i; else { edges.push([u, i]); break; } }
  return edges;
}

// Given group + edges (local indices) compute directed transfer amounts via subtree sums.
function treeAmounts(g, edges){
  const s = g.length;
  const adj = Array.from({length: s}, () => []);
  for(let e = 0; e < edges.length; e++){ const [a,b] = edges[e]; adj[a].push([b,e]); adj[b].push([a,e]); }
  const subSum = new Float64Array(s);
  const parent = new Int32Array(s).fill(-1);
  const parentEdge = new Int32Array(s).fill(-1);
  const order = [];
  const seen = new Array(s).fill(false);
  const stack = [0]; seen[0] = true;
  while(stack.length){
    const u = stack.pop(); order.push(u);
    for(const [v,e] of adj[u]) if(!seen[v]){ seen[v] = true; parent[v] = u; parentEdge[v] = e; stack.push(v); }
  }
  for(let i = order.length - 1; i >= 0; i--){
    const u = order[i];
    subSum[u] += g[u].balance;
    if(parent[u] >= 0) subSum[parent[u]] += subSum[u];
  }
  const detailed = [];
  let minAmt = Infinity;
  const inDeg = new Int32Array(s), outDeg = new Int32Array(s);
  for(let v = 0; v < s; v++){
    if(parent[v] < 0) continue;
    const p = parent[v];
    const flow = subSum[v];               // net balance of subtree rooted at v
    const amt = Math.abs(flow);
    if(amt <= EPS) continue;
    // flow<0: subtree owes -> child pays parent; flow>0: subtree is owed -> parent pays child
    const fromI = flow < 0 ? v : p;
    const toI   = flow < 0 ? p : v;
    outDeg[fromI]++; inDeg[toI]++;
    detailed.push({ from: g[fromI].name, to: g[toI].name, amount: amt });
    if(amt < minAmt) minAmt = amt;
  }
  // Constraint 2 metric: proxy nodes = have BOTH an incoming and an outgoing edge,
  // i.e. money just passes through them (B in A->B->C).
  let proxies = 0;
  for(let i = 0; i < s; i++) if(inDeg[i] > 0 && outDeg[i] > 0) proxies++;
  return { detailed, minAmt: detailed.length ? minAmt : Infinity, proxies };
}

function treeEdges(g, edges){ return treeAmounts(g, edges).detailed; }

// Fallback for unusually large atomic groups: greedy largest debtor -> largest creditor.
function greedyTree(g){
  const bal = g.map(p => ({ name: p.name, b: p.balance }));
  const out = [];
  const cmp = (x,y) => x.b - y.b;
  let guard = 0;
  while(guard++ < 10000){
    bal.sort(cmp);
    const d = bal[0], c = bal[bal.length - 1];
    if(!d || !c || d.b >= -EPS || c.b <= EPS) break;
    const amt = Math.min(-d.b, c.b);
    out.push({ from: d.name, to: c.name, amount: amt });
    d.b += amt; c.b -= amt;
  }
  return out;
}

/* ===================== RENDERING ===================== */
const MOBILE_MQ = window.matchMedia('(max-width: 768px)');   // mobile = stacked graph
let people = [];          // [{name, balance, idx, color, nodeId}] for the selected column
let activeNode = null;
let currentTransfers = [];   // [{from, to, amount}] currently drawn
let graphNodes = [];         // nodes currently drawn (people in 'balances' mode, ledger participants in 'txn' mode)
let graphMode = 'balances';  // 'balances' = settlement graph; 'txn' = raw transfer ledger graph
let txnNet = true;           // txn graph: true = net per pair (≤1 edge), false = both directions
let rawPeople = [];          // [{name, values:[...]}] one value per dataset column
let datasets = [];           // [{label, col?}] value columns (incl. virtual IOU/All Time)
let selectedDataset = 0;
let userPicked = false;      // true once the user clicks a dataset pill (stops default override)
let transactions = [];       // [{from, to, date, amount}] parsed settlement ledger (if any)

// Stable color for a person by name, keyed off their rawPeople index (same scheme
// as colorFor/nodeId) so chips/nodes match across the Balances table, the
// Transactions table and the graph. Unknown name -> neutral gray.
function colorForName(name){
  const i = rawPeople.findIndex(p => p.name === name);
  return i < 0 ? '#6c757d' : colorFor(i);
}
function nameChip(name){
  const bg = colorForName(name);
  return `<span class="badge" style="background-color:${bg};color:${textOn(bg)}">${escapeHtml(name)}</span>`;
}

function buildDot(transfers){
  const fontname = "Helvetica,Arial,sans-serif";
  // top-to-bottom on phones so the graph fills the tall screen (and scales up,
  // rather than a wide left-to-right graph shrinking to fit the narrow width)
  const rankdir = MOBILE_MQ.matches ? 'TB' : 'LR';
  // one uniform diameter for every node, sized to fit the longest name (so all
  // circles match AND nothing clips). ~0.6em avg glyph; /0.78 to fit a line in a
  // circle; +padding.
  // 'balances' mode: everyone present shows (incl. exact-$0 "evened out" 👻
  // nodes); only MISSING people are absent. $0 nodes have no transfer edges, so an
  // invisible edge anchors them to the bottom (see below).
  // 'txn' mode: nodes are the ledger participants; labels are name-only (no emoji /
  // balance line), edges are the aggregated (from,to) sums.
  const shown = graphNodes;
  const NAME_PT = 14;
  const maxChars = Math.max(3, ...shown.map(p => p.name.length));
  const diameter = Math.max(1.0, (maxChars * NAME_PT * 0.6 / 72) / 0.78 + 0.25).toFixed(2);
  let dot = 'digraph G {\n';
  dot += `  bgcolor="transparent"; rankdir=${rankdir}; pad=0.2; nodesep=0.5; ranksep=0.8;\n`;
  dot += `  node [shape=circle, fixedsize=true, width=${diameter}, style="filled", fontname="${fontname}", fontsize=${NAME_PT}, penwidth=2, color="#0b0d11"];\n`;
  dot += `  edge [fontname="${fontname}", fontsize=12, color="#8a93a5", fontcolor="#cfd6e4", penwidth=1.6, arrowsize=0.8];\n`;
  for(const p of shown){
    let lbl;
    if(graphMode === 'balances'){
      const emojiRow = p.emoji ? `${p.emoji}<BR/>` : '';   // emojis on their own top row
      lbl = `<${emojiRow}${escapeHtml(p.name)}<BR/><FONT POINT-SIZE="8">${escapeHtml(moneyWhole(p.balance))}</FONT>>`;
    }else{
      lbl = `<${escapeHtml(p.name)}>`;                      // ledger graph: name only
    }
    dot += `  "${esc(p.name)}" [id="${p.nodeId}", label=${lbl}, fillcolor="${p.color}", fontcolor="${textOn(p.color)}"];\n`;
  }
  transfers.forEach((t, i) => {
    dot += `  "${esc(t.from)}" -> "${esc(t.to)}" [id="edge-${i}", label="  ${moneyWhole(t.amount)}  "];\n`;
  });
  // anchor settled ($0) nodes below the flow via an invisible edge from a creditor
  if(graphMode === 'balances'){
    const zeros = graphNodes.filter(p => Math.abs(p.balance) <= EPS);
    const anchor = graphNodes.find(p => p.balance > EPS);
    if(anchor) for(const z of zeros){
      dot += `  "${esc(anchor.name)}" -> "${esc(z.name)}" [style=invis];\n`;
    }
  }
  dot += '}\n';
  return dot;
}

function renderGraph(transfers){
  currentTransfers = transfers;
  const dot = buildDot(transfers);
  const gv = d3.select('#graph').graphviz({ useWorker: false, fit: true, zoom: false });
  gv.onerror(msg => {
    document.getElementById('graph').innerHTML =
      '<p class="text-danger m-0">Could not render graph: ' + msg + '</p>';
  });
  gv.renderDot(dot, () => {
    const svg = d3.select('#graph svg');
    svg.attr('width', '100%').attr('height', null);
    // make rows able to highlight nodes (re-bind because SVG is regenerated)
    d3.selectAll('#graph g.node').style('cursor', 'pointer').on('click', function(){
      const id = this.getAttribute('id');
      const p = graphNodes.find(x => x.nodeId === id);
      if(p) selectPerson(p.nodeId);
    });
    applyGraphSelection();
  });
}

function selectPerson(nodeId){
  activeNode = (activeNode === nodeId) ? null : nodeId;
  highlightTable();
  applyGraphSelection();
}

// Highlight the selected node, its incoming/outgoing edges and connected
// vertices; dim everything else.
function applyGraphSelection(){
  const graph = document.getElementById('graph');
  if(!graph) return;
  d3.selectAll('#graph g.node, #graph g.edge').classed('keep', false).classed('hl', false);

  const sel = activeNode && graphNodes.find(p => p.nodeId === activeNode);
  // no selection, or the selected person isn't in the graph ($0) -> don't dim
  if(!sel || !document.getElementById(activeNode)){ graph.classList.remove('selecting'); return; }
  graph.classList.add('selecting');

  const keepNodes = new Set([activeNode]);
  currentTransfers.forEach((t, i) => {
    if(t.from !== sel.name && t.to !== sel.name) return;
    const otherName = t.from === sel.name ? t.to : t.from;
    const other = graphNodes.find(p => p.name === otherName);
    if(other) keepNodes.add(other.nodeId);
    d3.select('#edge-' + i).classed('keep', true);
  });
  d3.selectAll('#graph g.node').each(function(){
    const id = this.getAttribute('id');
    d3.select(this).classed('keep', keepNodes.has(id)).classed('hl', id === activeNode);
  });
}

function clearSelection(){
  if(!activeNode) return;
  activeNode = null;
  highlightTable();
  applyGraphSelection();
}

// Rank medal for the balances table: 🥇 #1, 🥈 #2, 💩 last. people is sorted by
// balance desc, so the row index is the rank. (Same count thresholds as the graph
// emojis so tiny groups don't get nonsensical medals.)
function tableMedal(rank, count){
  if(count >= 2 && rank === 0) return '🥇';
  if(count >= 3 && rank === 1) return '🥈';
  if(count >= 2 && rank === count - 1) return '💩';
  return '';
}

// Medals earned per person in one dated column (name -> medal char). Mirrors how
// showDataset builds `people`: present people only, sorted by balance desc.
function columnMedals(colIdx){
  const list = [];
  rawPeople.forEach(rp => { const v = rp.values[colIdx]; if(v != null) list.push({ name: rp.name, balance: v }); });
  list.sort((a, b) => b.balance - a.balance);
  const m = new Map();
  list.forEach((p, i) => { const md = tableMedal(i, list.length); if(md) m.set(p.name, md); });
  return m;
}

// Render a bag of medal chars in 🥇→🥈→💩 order, collapsing any kind with >5 to
// "🥇×11" so a long winning streak doesn't blow out the cell.
const MEDAL_ORDER = ['🥇', '🥈', '💩'];
function medalString(arr){
  const counts = {};
  for(const m of arr) counts[m] = (counts[m] || 0) + 1;
  return MEDAL_ORDER.filter(k => counts[k])
    .map(k => counts[k] > 5 ? `${k}×${counts[k]}` : k.repeat(counts[k]))
    .join('');
}

// All medals each person accumulated across the dated columns (every dataset with a
// source col — i.e. not the virtual IOU/All Time).
function accumulatedMedals(){
  const acc = new Map();   // name -> [medal chars]
  datasets.forEach((d, ci) => {
    if(d.col === undefined) return;
    for(const [name, md] of columnMedals(ci)){
      if(!acc.has(name)) acc.set(name, []);
      acc.get(name).push(md);
    }
  });
  const out = new Map();
  for(const [name, arr] of acc) out.set(name, medalString(arr));
  return out;
}

// How many dated columns this person actually appears in (non-empty cell).
function seenCount(rawIdx){
  let n = 0;
  datasets.forEach((d, i) => { if(d.col !== undefined && rawPeople[rawIdx].values[i] != null) n++; });
  return n;
}

function renderTable(){
  const label = datasets[selectedDataset] ? datasets[selectedDataset].label : '';
  const n = people.length;
  // All Time accumulates medals from every dated column + shows an Average column
  // (balance ÷ times seen); other columns (not IOU) get their own 🥇/🥈/💩.
  const isAllTime = label === 'All Time';
  const acc = isAllTime ? accumulatedMedals() : null;

  // Averages (computed once) + the top average gets a 👑 (suffixed first). All Time
  // is sorted by average desc, so its # rank follows average order too.
  let avg = null, crowned = new Set(), rankByName = null;
  if(isAllTime){
    avg = new Map(people.map(p => { const s = seenCount(p.idx); return [p.name, s ? p.balance / s : 0]; }));
    if(people.length >= 2){
      const max = Math.max(...avg.values());
      people.forEach(p => { if(avg.get(p.name) === max) crowned.add(p.name); });
    }
    const order = [...people].sort((a, b) => avg.get(b.name) - avg.get(a.name));
    rankByName = new Map(order.map((p, i) => [p.name, i + 1]));
  }

  const rows = people.map((p, i) => {
    let medal = '';
    if(isAllTime){
      medal = acc.get(p.name) || '';
      if(crowned.has(p.name)) medal = '👑' + medal;   // crown first in the suffix
    }else if(label !== 'IOUs') medal = tableMedal(i, n);
    const row = { rank: isAllTime ? rankByName.get(p.name) : i + 1,
      name: p.name, amount: p.balance, color: p.color, nodeId: p.nodeId, medal };
    if(isAllTime) row.average = avg.get(p.name);
    return row;
  });
  $('#balTable').bootstrapTable('load', rows);
  $('#balTable').bootstrapTable(isAllTime ? 'showColumn' : 'hideColumn', 'average');
  $('#balTable').bootstrapTable('sortBy', isAllTime
    ? { field: 'average', sortOrder: 'desc' } : { field: 'amount', sortOrder: 'desc' });
  document.getElementById('tableCard').classList.remove('d-none');
}

// Best-effort sort key for a ledger date string. Handles ISO / M-D-Y via native
// Date.parse, plus the spreadsheet's "D-Mon" / "Mon-D" (+ optional year) form.
// Unparseable -> -Infinity (sorts last when newest-first).
const MONTHS = { jan:0, feb:1, mar:2, apr:3, may:4, jun:5, jul:6, aug:7, sep:8, oct:9, nov:10, dec:11 };
function txnDateKey(s){
  if(!s) return -Infinity;
  s = String(s).trim();
  const native = Date.parse(s);
  if(!isNaN(native)) return native;
  let day = null, mon = null, year = 2000;
  for(const p of s.split(/[-/\s.]+/).filter(Boolean)){
    const m = p.toLowerCase().slice(0, 3);
    if(m in MONTHS) mon = MONTHS[m];
    else if(/^\d{4}$/.test(p)) year = +p;
    else if(/^\d{1,2}$/.test(p)){ if(day === null) day = +p; else year = 2000 + +p; }
  }
  return (mon === null || day === null) ? -Infinity : new Date(year, mon, day).getTime();
}

// Fetch + render a sheet. No URL params — the sheet comes from the UI / storage.
// Stale-while-revalidate: render the cached copy instantly, then fetch fresh in
// the background and re-render only if the CSV actually changed.
async function load(db){
  people = [];
  activeNode = null;
  document.getElementById('settleCard').classList.add('d-none');

  // reflect the current source in the Input tab + make the title link to the sheet
  document.getElementById('dbInput').value = db;
  document.getElementById('appTitle').href = db;
  document.getElementById('srcFrame').src = db;

  const csvUrl  = toCsvUrl(db);
  const csvKey  = 'iou_csv:' + csvUrl;
  let cached = null;
  try { cached = localStorage.getItem(csvKey); } catch(e) {}

  // title: show cached name instantly, then refresh in the background
  const titleKey = 'iou_title:' + db;
  let cachedTitle = null;
  try { cachedTitle = localStorage.getItem(titleKey); } catch(e) {}
  setTitle(cachedTitle);
  fetchSheetTitle(db).then(t => {
    if(t){ setTitle(t); try { localStorage.setItem(titleKey, t); } catch(e) {} }
  });

  // 1) instant render from cache (if any)
  let shownFromCache = false;
  if(cached) shownFromCache = applyCsv(cached);
  else setStatus('info', 'Loading sheet…');

  // 2) revalidate against the live sheet
  let fresh;
  try{
    fresh = await fetchSheetCsv(csvUrl);
  }catch(e){
    if(shownFromCache) return;   // keep the cached view; ignore transient network errors
    const fileHint = location.protocol === 'file:'
      ? ' You are opening this file directly (file://), which browsers block from fetching. ' +
        'Serve it over http — e.g. <code>python3 -m http.server</code> then open ' +
        '<code>http://localhost:8000/</code> — or use the deployed GitHub Pages URL.'
      : ' Make sure the sheet is published to the web. Use the <em>Input</em> tab to fix the URL.';
    setStatus('error', 'Could not load the sheet (' + escapeHtml(e.message) + ').' + fileHint);
    document.getElementById('tableCard').classList.remove('d-none');
    showTab('tab-input');
    return;
  }

  // 3) re-render only if the content changed
  if(fresh !== cached){
    try { localStorage.setItem(csvKey, fresh); } catch(e) {}
    applyCsv(fresh);
  }
}

// Parse CSV text into datasets + people and render. Returns false if no usable rows.
function applyCsv(text){
  const rows = Papa.parse(text, { skipEmptyLines: true }).data;

  // The sheet may stack two tables (blank separators already dropped by
  // skipEmptyLines): a balances block on top, then a settlement ledger whose
  // header is "From, To, Date, Amount". Split at that header if present.
  const isLedgerHeader = r =>
    String((r && r[0]) || '').trim().toLowerCase() === 'from' &&
    String((r && r[1]) || '').trim().toLowerCase() === 'to';
  const ledgerAt = rows.findIndex(isLedgerHeader);
  const balanceRows = ledgerAt >= 0 ? rows.slice(0, ledgerAt) : rows;
  const ledgerRows  = ledgerAt >= 0 ? rows.slice(ledgerAt + 1) : [];

  // Column 0 = name. Each later column with a header label is a selectable
  // dated dataset (e.g. dated snapshots like "9-Jun").
  const header = balanceRows[0] || [];
  const ds = [];
  for(let c = 1; c < header.length; c++){
    const lbl = (header[c] == null ? '' : String(header[c])).trim();
    if(lbl) ds.push({ label: lbl, col: c });
  }
  let dataRows = balanceRows.slice(1);
  if(!ds.length){                  // no header labels (old format): single column
    ds.push({ label: 'Balance', col: 1 });
    dataRows = balanceRows;
  }

  // One person per row, value per dated dataset column. A number (incl. explicit
  // 0 = "played, evened out") means present; an EMPTY cell means absent that
  // column and is stored as null so it can be hidden. Rows with no data anywhere,
  // and nameless / Total rows, are skipped.
  const rp = [];
  for(const r of dataRows){
    const name = (r[0] == null ? '' : String(r[0])).trim();
    if(!name || name.toLowerCase() === 'total') continue;
    const values = ds.map(d => { const v = parseAmount(r[d.col]); return isNaN(v) ? null : round2(v); });
    if(values.every(v => v === null)) continue;
    rp.push({ name, values });
  }

  if(!rp.length){
    setStatus('error', 'No <code>name, balance</code> rows found in the sheet. Expected the first column to be a name and later columns to be balances.');
    return false;
  }

  // Parse the ledger (if any) into {from, to, date, amount}.
  const txns = [];
  for(const r of ledgerRows){
    const from = (r[0] == null ? '' : String(r[0])).trim();
    const to   = (r[1] == null ? '' : String(r[1])).trim();
    const amount = parseAmount(r[3]);
    if(!from || !to || isNaN(amount)) continue;
    txns.push({ from, to, date: (r[2] == null ? '' : String(r[2])).trim(), amount: round2(amount) });
  }

  // When a ledger exists, prepend two virtual datasets — "All Time" (base owed,
  // = sum of the dated columns) and "IOUs" (All Time after applying the
  // ledger: payer +amount, payee -amount). Each person's value array gets the two
  // computed values unshifted so the index-based showDataset() needs no changes.
  if(txns.length){
    // a name only in the ledger (not in any dated column) still gets a row
    for(const t of txns) for(const nm of [t.from, t.to]){
      if(!rp.some(p => p.name === nm)) rp.push({ name: nm, values: ds.map(() => null) });
    }
    const allTime = new Map(rp.map(p => [p.name, p.values.reduce((s, v) => s + (v || 0), 0)]));
    const current = new Map(allTime);
    for(const t of txns){
      if(current.has(t.from)) current.set(t.from, current.get(t.from) + t.amount);
      if(current.has(t.to))   current.set(t.to,   current.get(t.to)   - t.amount);
    }
    for(const p of rp) p.values.unshift(round2(current.get(p.name)), round2(allTime.get(p.name)));
    ds.unshift({ label: 'IOUs' }, { label: 'All Time' });
  }

  datasets = ds;
  rawPeople = rp;
  transactions = txns;
  if(selectedDataset >= datasets.length) selectedDataset = 0;   // keep the user's column if possible
  // default to "All Time" until the user picks a pill themselves
  if(!userPicked){
    const at = datasets.findIndex(d => d.label === 'All Time');
    selectedDataset = at >= 0 ? at : 0;
  }
  renderDatasetToggle();
  renderTxnTable();
  showDataset(selectedDataset);
  return true;
}

// Build `people` from the chosen column, then render the table + graph.
function showDataset(idx){
  selectedDataset = idx;
  activeNode = null;
  // only people present (non-empty cell) in this column; color/nodeId keyed by the
  // stable rawPeople index so colors are consistent across columns
  people = [];
  rawPeople.forEach((rp, i) => {
    const v = rp.values[idx];
    if(v == null) return;   // absent this column -> don't show
    people.push({ name: rp.name, balance: v, idx: i, color: colorFor(i), nodeId: 'node-' + i, emoji: '' });
  });
  // sort highest balance first, then tag each node with rank + magnitude emojis
  people.sort((a, b) => b.balance - a.balance);
  const pot = totalPot();
  people.forEach((p, i) => { p.emoji = emojiFor(p.balance, pot, i, people.length); });
  markActiveDataset(idx);

  renderTable();
  const net = people.reduce((a, p) => a + p.balance, 0);
  if(Math.abs(net) > EPS){
    setStatus('error', `"${escapeHtml(datasets[idx].label)}" balances don't net to $0 — ` +
      `off by <strong>${money(net)}</strong>. Fix the sheet so every dollar is accounted for.`);
    document.getElementById('settleCard').classList.add('d-none');
    return;
  }
  setStatus('', '');
  document.getElementById('settleCard').classList.remove('d-none');
  renderBalGraph();
}

// Settlement graph for the selected balances column (Constraints 1-3).
function renderBalGraph(){
  if(!people.length) return;
  // mirror showDataset's guard: a non-net-zero column has no settlement graph
  if(Math.abs(people.reduce((a, p) => a + p.balance, 0)) > EPS){
    document.getElementById('settleCard').classList.add('d-none');
    return;
  }
  activeNode = null;
  graphMode = 'balances';
  graphNodes = people;
  document.getElementById('netToggleWrap').classList.replace('d-flex', 'd-none');
  document.getElementById('settleCard').classList.remove('d-none');
  renderGraph(computeTransfers(people).transfers);
}

// Raw transfer-ledger graph: no settlement algorithm. Sum the ledger per directed
// (from, to) pair. net=false keeps both directions (<=2 edges per pair); net=true
// collapses each pair to a single edge in the surplus direction (A->B minus B->A),
// always positive from->to. $0 edges omitted. (A dense all-pairs graph is fine.)
function txnGraphData(net){
  const names = [...new Set(transactions.flatMap(t => [t.from, t.to]))];
  const nodes = names.map(name => ({
    name, color: colorForName(name), emoji: '',
    nodeId: 'node-' + rawPeople.findIndex(p => p.name === name)
  }));
  const dir = new Map();                        // from + NUL + to -> {from, to, amount}
  for(const t of transactions){
    const k = t.from + '\u0000' + t.to;       // NUL can't appear in a name
    const e = dir.get(k) || { from: t.from, to: t.to, amount: 0 };
    e.amount += t.amount;
    dir.set(k, e);
  }
  let edges;
  if(net){
    edges = [];
    const done = new Set();
    for(const [k, e] of dir){
      if(done.has(k)) continue;
      const revK = e.to + '\u0000' + e.from;
      done.add(k); done.add(revK);
      const rev = dir.get(revK);
      const amt = e.amount - (rev ? rev.amount : 0);
      if(Math.abs(amt) <= EPS) continue;        // evened out -> no edge
      edges.push(amt > 0 ? { from: e.from, to: e.to, amount: amt }
                         : { from: e.to, to: e.from, amount: -amt });
    }
  }else{
    edges = [...dir.values()].filter(e => Math.abs(e.amount) > EPS).map(e => ({ ...e }));
  }
  edges.sort((a, b) => b.amount - a.amount);
  return { nodes, edges };
}

function renderTxnGraph(){
  if(!transactions.length) return;
  activeNode = null;
  graphMode = 'txn';
  document.getElementById('netToggleWrap').classList.replace('d-none', 'd-flex');
  const { nodes, edges } = txnGraphData(txnNet);
  graphNodes = nodes;
  document.getElementById('settleCard').classList.remove('d-none');
  renderGraph(edges);
}

const MAX_DATED_PILLS = 5;   // dated pills before the rest collapse into "More …"

function renderDatasetToggle(){
  const el = document.getElementById('dsToggle');
  el.innerHTML = '';
  el.classList.toggle('d-none', datasets.length <= 1);   // no toggle for a single column

  const pick = i => () => { userPicked = true; showDataset(i); };

  // computed columns (IOU / All Time) first, as standalone CTA pills
  datasets.forEach((d, i) => {
    if(d.col !== undefined) return;
    const b = document.createElement('button');
    b.type = 'button';
    b.dataset.ds = i;
    b.className = 'btn rounded-pill btn-outline-secondary fw-semibold';
    b.textContent = d.label;
    b.addEventListener('click', pick(i));
    el.appendChild(b);
  });

  // dated columns rightmost-first as a Bootstrap btn-group; overflow -> nested dropdown
  const dated = datasets.map((d, i) => i).filter(i => datasets[i].col !== undefined).reverse();
  if(!dated.length) return;
  const overflow = dated.length > MAX_DATED_PILLS ? dated.slice(MAX_DATED_PILLS) : [];
  const shown = overflow.length ? dated.slice(0, MAX_DATED_PILLS) : dated;

  const group = document.createElement('div');
  group.className = 'btn-group';
  group.setAttribute('role', 'group');
  shown.forEach(i => {
    const b = document.createElement('button');
    b.type = 'button';
    b.dataset.ds = i;
    b.className = 'btn btn-outline-secondary';
    b.textContent = datasets[i].label;
    b.addEventListener('click', pick(i));
    group.appendChild(b);
  });

  if(overflow.length){
    const sub = document.createElement('div');
    sub.className = 'btn-group';
    sub.id = 'dsMore';
    sub.setAttribute('role', 'group');
    const tgl = document.createElement('button');
    tgl.type = 'button';
    tgl.className = 'btn btn-outline-secondary dropdown-toggle';
    tgl.setAttribute('data-bs-toggle', 'dropdown');
    tgl.setAttribute('aria-expanded', 'false');
    tgl.textContent = 'More';
    const menu = document.createElement('ul');
    menu.className = 'dropdown-menu dropdown-menu-end';
    overflow.forEach(i => {
      const it = document.createElement('button');
      it.type = 'button';
      it.dataset.ds = i;
      it.className = 'dropdown-item';
      it.textContent = datasets[i].label;
      it.addEventListener('click', pick(i));
      const li = document.createElement('li');
      li.appendChild(it);
      menu.appendChild(li);
    });
    sub.append(tgl, menu);
    group.appendChild(sub);
  }
  el.appendChild(group);
}

// Highlight the selected dataset across the pills + the "More" dropdown.
function markActiveDataset(idx){
  document.querySelectorAll('#dsToggle [data-ds]').forEach(b => {
    const on = +b.dataset.ds === idx;
    if(b.classList.contains('dropdown-item')) b.classList.toggle('active', on);
    else { b.classList.toggle('btn-primary', on); b.classList.toggle('btn-outline-secondary', !on); }
  });
  const more = document.getElementById('dsMore');
  if(more){
    const sel = more.querySelector(`.dropdown-item[data-ds="${idx}"]`);
    const tgl = more.querySelector('.dropdown-toggle');
    tgl.classList.toggle('btn-primary', !!sel);
    tgl.classList.toggle('btn-outline-secondary', !sel);
    tgl.textContent = sel ? datasets[idx].label : 'More';   // show the picked one on the toggle
  }
}

function main(){
  initBalTable();
  initTxnTable();
  // clicking empty space in the graph (not a node) clears the selection
  document.getElementById('graph').addEventListener('click', e => {
    if(!e.target.closest('g.node')) clearSelection();
  });
  // re-render the graph when crossing the mobile breakpoint (LR <-> TB)
  MOBILE_MQ.addEventListener('change', () => { if(graphNodes.length) renderGraph(currentTransfers); });
  // the Transfers graph follows the active tab: Balances -> settlement graph,
  // Transactions -> raw transfer-ledger graph
  document.getElementById('tab-bal').addEventListener('shown.bs.tab', renderBalGraph);
  document.getElementById('tab-txn').addEventListener('shown.bs.tab', renderTxnGraph);
  // Net toggle re-renders the (transactions) graph: net vs both-directions
  document.getElementById('netToggle').addEventListener('change', e => {
    txnNet = e.target.checked;
    if(graphMode === 'txn') renderTxnGraph();
  });
  document.getElementById('dbLoad').addEventListener('click', () => {
    const v = document.getElementById('dbInput').value.trim();
    if(!v) return;
    try { localStorage.setItem(STORE_KEY, v); } catch(e) {}
    showTab('tab-bal');
    load(v);
  });
  let saved = null;
  try { saved = localStorage.getItem(STORE_KEY); } catch(e) {}
  load(saved || DEMO);
}

main();
</script>
