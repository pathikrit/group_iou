     typewriter-ledger face (poker UI: tabs/table/edges); Ewert + Rye = poker chips. -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<style>
  /* The only non-Bootstrap CSS: a darker dark palette (via Bootstrap's own CSS
     variables — its recommended theming hook) and the Graphviz SVG internals (no
     Bootstrap equivalent). Font sizes are left to Bootstrap defaults. */
  /* Stop mobile Chrome from auto-inflating ("font boosting") the table/tabs text,
     which blows up the HTML relative to the fixed-size SVG graph. */
  html{ -webkit-text-size-adjust:100%; text-size-adjust:100%; }
  [data-bs-theme="dark"]{ --bs-body-bg:#0f1115; --bs-body-color:#e7e9ee; --bs-border-color:#2a2f3a; }
  /* App font follows the mode (set on <body> via .poker-ui by setPokerMode): Inter
     (financial/UI) normally, Special Elite (fun typewriter-ledger) in poker mode. The
     whole app inherits this through Bootstrap's --bs-body-font-family hook. Numbers use
     tabular figures so they align like a statement. */
  body{ --bs-body-font-family:'Inter',system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;
        font-variant-numeric:tabular-nums; }
  body.poker-ui{ --bs-body-font-family:'Special Elite','Inter',monospace; }
  body.poker-ui #appTitle{ font-family:'Rye','Special Elite',cursive; }
  .card{--bs-card-bg:#171a21; --bs-card-border-color:#2a2f3a}
  .nav-tabs{--bs-nav-tabs-border-color:#2a2f3a}

  /* Transactions: ~10 newest rows then scroll, with a sticky header */
  #pane-txn .fixed-table-body{max-height:32rem;overflow:auto}
  #txnTable thead th{position:sticky;top:0;z-index:1;background:var(--bs-card-bg,#171a21)}

  /* Balances/Transactions tables a touch larger than the Bootstrap default (name
     chips are em-based, so they scale with it and stay proportionate). */
  #pane-bal table, #pane-txn table{font-size:1.1rem}

  /* graph (Graphviz SVG internals — no Bootstrap equivalent). The SVG drives its
     own height (height:auto, scaled to fit width), so no hardcoded min-height.
     Cap the width so chips don't balloon on a wide desktop (centered via margin);
     on mobile it stays under the cap, so it just fits the width — no h-scroll. */
  #graph svg{max-width:min(100%,54rem);height:auto;display:block;margin:0 auto}
  /* let chips be dragged on touch screens: stop the browser from treating a
     touch-drag on a chip as a page scroll/zoom (otherwise d3-drag never fires) */
  #graph g.node{touch-action:none;-webkit-tap-highlight-color:transparent}
  #graph g.node,#graph g.edge{transition:opacity .15s}
  #graph.selecting g.node,#graph.selecting g.edge{opacity:.12}
  #graph.selecting g.node.keep,#graph.selecting g.edge.keep{opacity:1}
  #graph g.node.hl ellipse,#graph g.node.hl polygon,#graph g.node.hl path{
    stroke:#fff !important;stroke-width:4px !important;filter:drop-shadow(0 0 6px rgba(255,255,255,.6));}
  #graph g.edge.keep path{stroke-width:3px !important}
  #graph g.edge.keep text{font-weight:700}

  @media (max-width:768px){
    #pane-txn .fixed-table-body{max-height:60vh}
  }
  /* mobile dataset toggle: the dated pills sit below the full-width All Time button
     as ONE horizontally scrollable line (no responsive overflow utility in Bootstrap) */
  @media (max-width:767.98px){
    #dsToggle .btn-group{overflow-x:auto}
  }
</style>
</head>
<body>

      <svg width="28" height="28" class="d-block" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"></path></svg>

<script>
/* ===================== CONFIG ===================== */
// THE sheet this app reads — hardcoded (no URL entry anywhere in the UI).
const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQLcZzzLn04LIt9xnaa43mMZyt1xUiisn2SzZ8Zbo1QeWnhyB1roNjwqw0EG9hvMwGGDYurUSwK5Oxv/pubhtml?gid=0&single=true";
const STORE_KEY = 'iou_db';   // remembers a user-entered sheet URL (Update button) across reloads
// The sheet to load: a user-entered URL saved in localStorage, else the hardcoded default.
function currentSheetUrl(){
  try { return localStorage.getItem(STORE_KEY) || SHEET_URL; } catch(e) { return SHEET_URL; }
}
const EPS = 0.005;          // net-zero tolerance (< 1 cent)
const PALETTE = d3.schemeTableau10;   // categorical colors for names
const MAX_EXACT_N = 15;     // exact partition DP up to this many active people
const MAX_TREE_S  = 8;      // exact spanning-tree search up to this group size

// Poker mode: win/loss framing — medal & crown emojis, the All Time Average column,
// and 🔺/🔻 balances. Default on when the sheet title mentions "poker"; off means a
// plain ledger (no medals/crowns/averages, +/- signed balances). The toggle is the
// poker-chip button in the header. pokerUserSet sticks the user's manual choice so a
// later title refresh doesn't override it (mirrors `userPicked`).
let pokerMode = false;
let pokerUserSet = false;

/* ===================== URL / DATA HELPERS ===================== */
// Turn a published "pubhtml" URL into a CSV endpoint (served with permissive CORS).
function toCsvUrl(u){
  try{
    const url = new URL(u);
    const path = url.pathname.replace(/\/pubhtml\/?$/, '/pub').replace(/\/pub\/?$/, '/pub');
    const gid = url.searchParams.get('gid') || '0';
    return `${url.origin}${path}?gid=${gid}&single=true&output=csv`;
  }catch(e){ return u; }
}

// Fetch the published sheet as CSV text. Google serves the CSV with
// `Access-Control-Allow-Origin: *`, so a direct browser fetch works — BUT only
// from a real origin. Opening this file via file:// gives an opaque (null) origin
// and browsers block the request ("Failed to fetch"); serve over http(s) instead.
async function fetchSheetCsv(csvUrl){
  const r = await fetch(csvUrl, { redirect: 'follow' });
  if(!r.ok) throw new Error('HTTP ' + r.status);
  return await r.text();
}

// Best-effort: read the sheet's name from the pubhtml page's <title>. The CSV
// endpoint has no title, so this is a separate fetch that may be CORS-blocked —
// on any failure we just keep the default heading.
function setTitle(name){
  // heading shows the sheet name; the document <title> stays "Group IOU"
  const t = (name || '').trim();
  document.getElementById('appTitle').textContent = t || 'Group IOU';
  // default poker mode from the title (unless the user has toggled it manually)
  if(!pokerUserSet) setPokerMode(/poker/i.test(t));
}

// Set poker mode + sync the Input-tab switch and (if data is loaded) re-render the
// dependent views.
function setPokerMode(on){
  pokerMode = on;
  document.getElementById('pokerToggle').checked = on;
  document.body.classList.toggle('poker-ui', on);   // swaps the app font (Inter <-> Special Elite)
  if(people.length){
    // node emojis are cached on each person (showDataset) — recompute so the rank
    // medals/crown appear/disappear with the mode
    const pot = totalPot();
    people.forEach((p, i) => { p.emoji = emojiFor(p.balance, pot, i, people.length); });
    renderTable();
    if(graphMode === 'balances') renderBalGraph();
  }
}
async function fetchSheetTitle(pubUrl){
  try{
    const r = await fetch(pubUrl, { redirect: 'follow' });
    if(!r.ok) return null;
    const html = await r.text();
    const m = html.match(/<title[^>]*>([\s\S]*?)<\/title>/i);
    if(!m) return null;
    const ta = document.createElement('textarea');     // decode HTML entities
    ta.innerHTML = m[1];
    return ta.value.replace(/\s*[-–—]\s*Google (Drive|Sheets)\s*$/i, '').trim() || null;
  }catch(e){ return null; }
}

function parseAmount(s){
  if(typeof s === 'number') return s;
  if(s == null) return NaN;
  s = String(s).trim();
  if(!s) return NaN;
  let neg = false;
  if(/^\(.*\)$/.test(s)){ neg = true; s = s.slice(1, -1); }   // (123) => negative
  s = s.replace(/[$,\s]/g, '');
  if(s.startsWith('-')){ neg = true; s = s.slice(1); }
  if(s.startsWith('+')) s = s.slice(1);
  const v = parseFloat(s);
  if(isNaN(v)) return NaN;
  return neg ? -v : v;
}

const round2 = v => Math.round(v * 100) / 100;
function money(v){
  v = round2(v);
  const a = Math.abs(v);
  const s = Number.isInteger(a) ? String(a) : a.toFixed(2);
  return (v < 0 ? '-$' : '$') + s;
}
// whole-dollar display (matches the spreadsheet style) but keeps sign
function moneyWhole(v){
  const r = Math.round(v);
  return (r < 0 ? '-$' : '$') + Math.abs(r);
}
// signed whole-dollar display. Poker mode: a financial-style up/down triangle
// (▲ owed to you, ▼ you owe). These are text glyphs (not emoji) so they inherit the
// surrounding color — green up / red down in the table, the node color in the graph
// — matching the number. Otherwise a plain +/- sign (positives get a +). Exact $0
// gets no prefix either way.
function moneySigned(v){
  const r = Math.round(v);
  const prefix = pokerMode ? (r > 0 ? '▲' : r < 0 ? '▼' : '')
                           : (r > 0 ? '+' : r < 0 ? '-' : '');
  return prefix + '$' + Math.abs(r);
}
// Table HTML for a signed amount: in poker mode the ▲/▼ glyph crowds the number in the
// display font, so put a small gap after it. (The graph chip handles its own spacing.)
function moneySignedCell(v){
  const s = moneySigned(v);
  if(!pokerMode) return s;                       // +/- reads fine tight
  const i = s.indexOf('$');
  return i > 0 ? `<span style="margin-right:.18em">${s.slice(0, i)}</span>${s.slice(i)}` : s;
}

// The "pot" = total money that changed hands = sum of the positive balances
// (equals the sum of |negative| balances since the column nets to 0). Used to pick
// emoji tiers by % of the pot, so they scale regardless of the stakes.
const totalPot = () => people.reduce((s, p) => s + (p.balance > 0 ? p.balance : 0), 0);

// Win/loss ranking emoji for a person at `rank` of `count` (best-first): winner /
// runner-up / last place. THE single source of the poker gate — returns '' unless
// poker mode is on, so callers (graph + table) never branch on pokerMode. `gold` is
// the winner glyph (👑 in the graph, 🥇 in the table).
function rankEmoji(rank, count, gold){
  if(!pokerMode || count < 2) return '';
  if(rank === 0) return gold;
  if(rank === 1 && count >= 3) return '🥈';
  if(rank === count - 1) return '💩';
  return '';
}

// Reaction emojis for a graph node. A person can get up to two: a rank emoji
// (winner / 2nd / last) plus a magnitude emoji. The magnitude tier is chosen by the
// balance as a % of the pot (so it scales regardless of stakes). rank is the
// 0-based index in the descending-by-balance list; count is the number of people.
function emojiFor(balance, pot, rank, count){
  let e = rankEmoji(rank, count, '👑');
  if(Math.abs(balance) <= EPS) return e + '👻';           // exact $0 (present, evened out)
  const pct = pot ? Math.abs(balance) / pot * 100 : 0;    // magnitude tiers, % of pot
  if(pct < 5) e += '🤷';                                  // near-even (nonzero, either sign)
  else if(balance > 0) e += pct < 15 ? '😅' : pct < 30 ? '😁' : pct < 50 ? '🥳' : '🍾';
  else                 e += pct < 15 ? '😓' : pct < 30 ? '😫' : pct < 50 ? '😭' : '😱';
  return e;
}

function colorFor(i){
  if(i < PALETTE.length) return PALETTE[i];
  return d3.hsl((i * 137.508) % 360, 0.62, 0.55).formatHex();
}
function textOn(bg){
  const c = d3.color(bg).rgb();
  const lum = (0.299*c.r + 0.587*c.g + 0.114*c.b) / 255;
  return lum > 0.6 ? '#111111' : '#ffffff';
}
// Green/red for a signed amount, drawn on the chip's "groove"-colored backing pill
// (textOn(fill) — white on a dark chip, black on a light one; see buildDot). The
// pill is always white or black, so we just pick the shade that reads on it: a dark
// green/red on the white pill, a bright one on the black pill. Never red-on-red /
// green-on-green. Exact $0 has no win/loss color → a neutral gray.
function moneyColorOn(pill, v){
  const light = d3.color(pill).rgb().r > 128;   // pill is #ffffff (white) or #111111 (black)
  if(Math.abs(v) <= EPS) return light ? '#475569' : '#cbd5e1';
  return v < 0 ? (light ? '#b91c1c' : '#f87171')   // red:   dark on white, bright on black
               : (light ? '#15803d' : '#4ade80');  // green: dark on white, bright on black
}
const esc = s => String(s).replace(/\\/g,'\\\\').replace(/"/g,'\\"');

/* ===================== SETTLEMENT ALGORITHM ===================== */
// people: [{name, balance, idx}] -> returns {transfers:[{from,to,amount}], exact:bool}
//
// We pick the settlement graph by three constraints, applied strictly in order:
//
//   Constraint 1 — fewest edges (fewest transfers).
//     = n - (max number of disjoint zero-sum subgroups), via the bitmask DP in
//       maxZeroSumPartition. Each atomic subgroup then settles as a spanning tree
//       (exactly size-1 edges), and each tree edge's amount + direction is fully
//       determined by its subtree balance sum.
//
//   Constraint 2 — among all graphs meeting Constraint 1, the fewest "proxy" nodes,
//     i.e. nodes that have both an incoming and an outgoing edge. We prefer
//     {A->B; A->C} over {A->B->C}: in the chain, B just proxies A's money to C, so
//     we'd rather A make 2 direct transfers than route through an intermediary.
//     (Counting proxies, not senders, also rules out debtor proxies like A->B->C
//     where B is itself a debtor.)
//
//   Constraint 3 — among all graphs meeting Constraints 1 and 2, the one that
//     maximizes the smallest transfer (avoid needless tiny payments).
//
// Constraints 2 and 3 are optimized in bestSpanningTree by enumerating every
// spanning tree of each subgroup and selecting lexicographically: fewest proxy
// nodes, then largest minimum edge.
function computeTransfers(people){
  const active = people.filter(p => Math.abs(p.balance) > EPS);
  const n = active.length;
  if(n === 0) return { transfers: [], exact: true };

  let groups, exact = true;
  if(n <= MAX_EXACT_N){
    groups = maxZeroSumPartition(active);
  }else{
    exact = false;
    groups = [active.slice()];   // treat as one group; greedy tree below
  }

  const transfers = [];
  for(const g of groups){
    if(g.length <= 1) continue;
    const tree = (g.length <= MAX_TREE_S) ? bestSpanningTree(g) : greedyTree(g);
    for(const t of tree) transfers.push(t);
  }
  // largest transfers first for a tidy display
  transfers.sort((a,b) => b.amount - a.amount);
  return { transfers, exact };
}

// Bitmask DP: partition into the max number of zero-sum subsets. Returns array of groups.
function maxZeroSumPartition(active){
  const n = active.length;
  const bal = active.map(p => p.balance);
  const full = (1 << n) - 1;
  const sum = new Float64Array(1 << n);
  for(let mask = 1; mask <= full; mask++){
    const low = mask & (-mask);
    const i = Math.log2(low) | 0;
    sum[mask] = sum[mask ^ low] + bal[i];
  }
  const isZero = mask => mask !== 0 && Math.abs(sum[mask]) <= EPS;

  const best = new Int32Array(1 << n).fill(-1);
  const choice = new Int32Array(1 << n);
  best[0] = 0;
  for(let mask = 1; mask <= full; mask++){
    const low = mask & (-mask);
    // enumerate submasks of `mask` that contain the lowest set bit (counts each partition once)
    for(let sub = mask; sub > 0; sub = (sub - 1) & mask){
      if(!(sub & low)) continue;
      if(!isZero(sub)) continue;
      const rest = mask ^ sub;
      if(best[rest] < 0) continue;
      if(1 + best[rest] > best[mask]){ best[mask] = 1 + best[rest]; choice[mask] = sub; }
    }
  }

  const groups = [];
  let mask = full;
  while(mask){
    const sub = choice[mask];
    const g = [];
    for(let i = 0; i < n; i++) if(sub & (1 << i)) g.push(active[i]);
    groups.push(g);
    mask ^= sub;
  }
  return groups;
}

// All labeled spanning trees of a group via Prüfer sequences. Edge amounts are
// determined by subtree balance sums; pick the best tree per Constraints 2 then 3.
function bestSpanningTree(g){
  const s = g.length;
  if(s === 2) return treeEdges(g, [[0,1]]);
  // Among all spanning trees (all minimal settlements), pick the best by, in order:
  //   Constraint 2: fewest proxy nodes (both an incoming and an outgoing edge), then
  //   Constraint 3: largest minimum transfer.
  let best = null;
  const seq = new Array(s - 2).fill(0);
  const total = Math.pow(s, s - 2);
  for(let k = 0; k < total; k++){
    // decode k -> base-s Prüfer sequence
    let x = k;
    for(let j = 0; j < s - 2; j++){ seq[j] = x % s; x = (x / s) | 0; }
    const edges = pruferToEdges(seq, s);
    const cand = treeAmounts(g, edges);
    if(!best ||
       cand.proxies < best.proxies ||
       (cand.proxies === best.proxies && cand.minAmt > best.minAmt)){
      best = cand;
    }
  }
  return best.detailed;
}

function pruferToEdges(seq, s){
  const degree = new Array(s).fill(1);
  for(const v of seq) degree[v]++;
  const edges = [];
  for(const v of seq){
    let leaf = -1;
    for(let i = 0; i < s; i++) if(degree[i] === 1){ leaf = i; break; }
    edges.push([leaf, v]); degree[leaf]--; degree[v]--;
  }
  let u = -1;
  for(let i = 0; i < s; i++) if(degree[i] === 1){ if(u < 0) u = i; else { edges.push([u, i]); break; } }
  return edges;
}

// Given group + edges (local indices) compute directed transfer amounts via subtree sums.
function treeAmounts(g, edges){
  const s = g.length;
  const adj = Array.from({length: s}, () => []);
  for(let e = 0; e < edges.length; e++){ const [a,b] = edges[e]; adj[a].push([b,e]); adj[b].push([a,e]); }
  const subSum = new Float64Array(s);
  const parent = new Int32Array(s).fill(-1);
  const parentEdge = new Int32Array(s).fill(-1);
  const order = [];
  const seen = new Array(s).fill(false);
  const stack = [0]; seen[0] = true;
  while(stack.length){
    const u = stack.pop(); order.push(u);
    for(const [v,e] of adj[u]) if(!seen[v]){ seen[v] = true; parent[v] = u; parentEdge[v] = e; stack.push(v); }
  }
  for(let i = order.length - 1; i >= 0; i--){
    const u = order[i];
    subSum[u] += g[u].balance;
    if(parent[u] >= 0) subSum[parent[u]] += subSum[u];
  }
  const detailed = [];
  let minAmt = Infinity;
  const inDeg = new Int32Array(s), outDeg = new Int32Array(s);
  for(let v = 0; v < s; v++){
    if(parent[v] < 0) continue;
    const p = parent[v];
    const flow = subSum[v];               // net balance of subtree rooted at v
    const amt = Math.abs(flow);
    if(amt <= EPS) continue;
    // flow<0: subtree owes -> child pays parent; flow>0: subtree is owed -> parent pays child
    const fromI = flow < 0 ? v : p;
    const toI   = flow < 0 ? p : v;
    outDeg[fromI]++; inDeg[toI]++;
    detailed.push({ from: g[fromI].name, to: g[toI].name, amount: amt });
    if(amt < minAmt) minAmt = amt;
  }
  // Constraint 2 metric: proxy nodes = have BOTH an incoming and an outgoing edge,
  // i.e. money just passes through them (B in A->B->C).
  let proxies = 0;
  for(let i = 0; i < s; i++) if(inDeg[i] > 0 && outDeg[i] > 0) proxies++;
  return { detailed, minAmt: detailed.length ? minAmt : Infinity, proxies };
}

function treeEdges(g, edges){ return treeAmounts(g, edges).detailed; }

// Fallback for unusually large atomic groups: greedy largest debtor -> largest creditor.
function greedyTree(g){
  const bal = g.map(p => ({ name: p.name, b: p.balance }));
  const out = [];
  const cmp = (x,y) => x.b - y.b;
  let guard = 0;
  while(guard++ < 10000){
    bal.sort(cmp);
    const d = bal[0], c = bal[bal.length - 1];
    if(!d || !c || d.b >= -EPS || c.b <= EPS) break;
    const amt = Math.min(-d.b, c.b);
    out.push({ from: d.name, to: c.name, amount: amt });
    d.b += amt; c.b -= amt;
  }
  return out;
}

/* ===================== RENDERING ===================== */
let people = [];          // [{name, balance, idx, color, nodeId}] for the selected column
let activeNode = null;
let currentTransfers = [];   // [{from, to, amount}] currently drawn
let graphNodes = [];         // nodes currently drawn (people in 'balances' mode, ledger participants in 'txn' mode)
let graphMode = 'balances';  // 'balances' = settlement graph; 'txn' = raw transfer ledger graph
let fontChecked = false;     // one-shot: re-render chips once the web fonts finish loading
let txnNet = true;           // txn graph: true = net per pair (≤1 edge), false = both directions
let rawPeople = [];          // [{name, values:[...]}] one value per dataset column
let datasets = [];           // [{label, col?}] value columns (incl. virtual All Time)
let selectedDataset = 0;
let userPicked = false;      // true once the user clicks a dataset pill (stops default override)
let transactions = [];       // [{from, to, date, amount}] parsed settlement ledger (if any)

// Stable color for a person by name, keyed off their rawPeople index (same scheme
// as colorFor/nodeId) so chips/nodes match across the Balances table, the
// Transactions table and the graph. Unknown name -> neutral gray.
function colorForName(name){
  const i = rawPeople.findIndex(p => p.name === name);
  return i < 0 ? '#6c757d' : colorFor(i);
}
function nameChip(name){
  const bg = colorForName(name);
  return `<span class="badge" style="background-color:${bg};color:${textOn(bg)}">${escapeHtml(name)}</span>`;
}

function buildDot(transfers){
  // graph font follows the mode: edges + non-poker chip labels use Inter (financial)
  // / Special Elite (poker fun). Poker chip text itself is Ewert/Rye (drawChipText).
  const fontname = pokerMode ? "Special Elite" : "Inter";
  // always left-to-right (the "desktop" layout); on mobile the SVG just scales
  // down to fit the narrow width (max-width:100%), so no horizontal scrolling
  const rankdir = 'LR';
  // one uniform diameter for every node, sized to fit the longest name (so all
  // circles match AND nothing clips). ~0.6em avg glyph; /0.78 to fit a line in a
  // circle; +padding.
  // 'balances' mode: everyone present shows (incl. exact-$0 "evened out" 👻
  // nodes); only MISSING people are absent. $0 nodes have no transfer edges, so an
  // invisible edge anchors them to the bottom (see below).
  // 'txn' mode: nodes are the ledger participants; labels are name-only (no emoji /
  // balance line), edges are the aggregated (from,to) sums.
  const shown = graphNodes;
  const NAME_PT = 22, AMT_PT = 13;
  // Poker chips use the Ewert western/casino display face (poker mode only); it's a
  // wide, all-caps display face, so it needs a fatter per-glyph estimate AND more of
  // the circle kept clear. Emojis carry no Ewert glyphs → system emoji font fallback.
  const nodeFont = pokerMode ? `Ewert,${fontname}` : fontname;
  const glyphW = pokerMode ? 0.92 : 0.6;        // avg glyph width as a fraction of em
  // Uniform diameter (inches): the longest name AND the full label height must fit
  // inside the clear inner face — i.e. within FIT × diameter across. Poker keeps a
  // smaller FIT so the name never reaches the rim/groove band; plain mode can use
  // more of the circle. Take the max of the width- and height-driven needs.
  const FIT = pokerMode ? 0.50 : 0.72;          // fraction of the diameter the label may span
                                                // (poker keeps the name inside the 0.6r face ring)
  const maxChars = Math.max(3, ...shown.map(p => p.name.length));
  const nameW = maxChars * NAME_PT * glyphW / 72;                          // widest name (in)
  const rows = graphMode === 'balances' ? [NAME_PT, NAME_PT, AMT_PT] : [NAME_PT];  // emoji/name/$
  const labelH = rows.reduce((s, pt) => s + pt, 0) * 1.3 / 72;             // label stack height (in)
  const diameterNum = Math.max(2.0, nameW / FIT, labelH / FIT);
  const diameter = diameterNum.toFixed(2);
  // Edge label font / stroke / arrow scale WITH the chip size (the graph scales to fit
  // width, so a fixed 12pt looked tiny next to big chips). Tuned to roughly match the
  // chip's $ amount text.
  const edgeFs  = Math.round(diameterNum * 8);
  const edgePen = (diameterNum * 0.45).toFixed(2);
  const arrowSc = (diameterNum * 0.5).toFixed(2);
  let dot = 'digraph G {\n';
  dot += `  bgcolor="transparent"; rankdir=${rankdir}; pad=0.2; nodesep=0.5; ranksep=0.8;\n`;
  dot += `  node [shape=circle, fixedsize=true, width=${diameter}, style="filled", fontname="${nodeFont}", fontsize=${NAME_PT}, penwidth=2, color="#0b0d11"];\n`;
  dot += `  edge [fontname="${fontname}", fontsize=${edgeFs}, color="#8a93a5", fontcolor="#cfd6e4", penwidth=${edgePen}, arrowsize=${arrowSc}];\n`;
  // Every node gets an EMPTY label — we draw the emoji/name/$ ourselves in SVG
  // (drawChipLabels) for BOTH modes. Graphviz lays out HTML labels with its own font
  // metrics, which don't match the web fonts (Inter/Ewert) → off-center text & a
  // mis-sized/clipped $ pill. The empty label still reserves the fixed-size circle.
  for(const p of shown){
    dot += `  "${esc(p.name)}" [id="${p.nodeId}", label="", fillcolor="${p.color}", fontcolor="${textOn(p.color)}"];\n`;
  }
  transfers.forEach((t, i) => {
    dot += `  "${esc(t.from)}" -> "${esc(t.to)}" [id="edge-${i}", label="  ${moneyWhole(t.amount)}  "];\n`;
  });
  // anchor settled ($0) nodes below the flow via an invisible edge from a creditor
  if(graphMode === 'balances'){
    const zeros = graphNodes.filter(p => Math.abs(p.balance) <= EPS);
    const anchor = graphNodes.find(p => p.balance > EPS);
    if(anchor) for(const z of zeros){
      dot += `  "${esc(anchor.name)}" -> "${esc(z.name)}" [style=invis];\n`;
    }
  }
  dot += '}\n';
  return dot;
}

function renderGraph(transfers){
  currentTransfers = transfers;
  const dot = buildDot(transfers);
  const gv = d3.select('#graph').graphviz({ useWorker: false, fit: true, zoom: false });
  gv.onerror(msg => {
    document.getElementById('graph').innerHTML =
      '<p class="text-danger m-0">Could not render graph: ' + msg + '</p>';
  });
  // strip our injected chip decorations first: d3-graphviz diffs the existing SVG
  // against the new render and crashes on children it didn't create (no bound datum)
  d3.selectAll('#graph .chip-deco').remove();
  gv.renderDot(dot, () => {
    const svg = d3.select('#graph svg');
    svg.attr('width', '100%').attr('height', null);
    if(pokerMode) decoratePokerChips(svg);   // poker-chip rings (poker only)
    drawChipLabels(svg);                      // centered emoji/name/$ text (both modes)
    // let chips be dragged around (and click-to-highlight when not dragged)
    enableNodeDrag(svg);
    applyGraphSelection();
    // chip text auto-fits via getComputedTextLength, so it must be measured with the
    // real web font (Inter/Ewert): re-render once after fonts finish loading (one-shot).
    if(!fontChecked && document.fonts && document.fonts.ready){
      fontChecked = true;
      document.fonts.ready.then(() => { if(currentTransfers) renderGraph(currentTransfers); });
    }
  });
}

// Poker mode: overlay each node circle with poker-chip edge spots — a ring of a few
// chunky contrasting blocks (a wide dashed stroke) plus a thin inner "face" ring.
// Drawn just inside the rim, between the fill and the label, so name/amount stay
// fully readable. (Graphviz can't do the chunky-segment look, so we draw it in SVG.)
const SVGNS = 'http://www.w3.org/2000/svg';
function decoratePokerChips(svg){
  svg.selectAll('g.node').each(function(){
    const ell = this.querySelector('ellipse');
    if(!ell) return;
    const cx = +ell.getAttribute('cx'), cy = +ell.getAttribute('cy'), r = +ell.getAttribute('rx');
    const rim = textOn(ell.getAttribute('fill') || '#888');   // contrast w/ fill: white on dark, black on light
    const before = ell.nextSibling;   // keep decorations under the text nodes
    const circle = (radius, width, dash) => {
      const c = document.createElementNS(SVGNS, 'circle');
      c.setAttribute('class', 'chip-deco');   // tagged so renderGraph can strip before graphviz re-diffs
      c.setAttribute('cx', cx); c.setAttribute('cy', cy); c.setAttribute('r', radius);
      c.setAttribute('fill', 'none'); c.setAttribute('stroke', rim); c.setAttribute('stroke-width', width);
      if(dash){ c.setAttribute('stroke-dasharray', dash); c.setAttribute('stroke-linecap', 'butt'); }
      this.insertBefore(c, before);
    };
    // chunky edge blocks: 8 arcs of a wide stroke, sitting just inside the edge
    const NBLOCKS = 8, band = r * 0.2, rRim = r - band / 2 - 1;
    const seg = 2 * Math.PI * rRim / NBLOCKS;
    circle(rRim, band, `${(seg * 0.5).toFixed(2)} ${(seg * 0.5).toFixed(2)}`);
    // thin inner ring marking the chip's center face
    circle(r * 0.6, Math.max(1.5, r * 0.025));
  });
}

// Draw the node label ourselves (the DOT label is empty) so it's exactly centered and
// the $ pill fits — text-anchor=middle at the node center. Both modes & both graphs.
function drawChipLabels(svg){
  svg.selectAll('g.node').each(function(){
    const ell = this.querySelector('ellipse'); if(!ell) return;
    const person = graphNodes.find(p => p.nodeId === this.getAttribute('id'));
    if(!person) return;
    drawChipText(this, person, +ell.getAttribute('cx'), +ell.getAttribute('cy'),
                 +ell.getAttribute('rx'), ell.getAttribute('fill') || '#888');
  });
}

// Centered emoji / name / $-pill for a chip, drawn in raw SVG (see above). Fonts
// follow the mode: poker = Ewert name + Rye number; plain = Inter throughout.
const EWERT_STACK = "'Ewert', Helvetica, Arial, sans-serif";
const RYE_STACK   = "'Rye', Helvetica, Arial, sans-serif";
const INTER_STACK = "'Inter', Helvetica, Arial, sans-serif";
const CLEAN_STACK = "Helvetica, Arial, sans-serif";   // ▲/▼ prefix (geometric glyph)
const EMOJI_STACK = "'Apple Color Emoji', 'Segoe UI Emoji', 'Noto Color Emoji', sans-serif";
function drawChipText(g, person, cx, cy, r, fill){
  const groove = textOn(fill);
  const nameFont = pokerMode ? EWERT_STACK : INTER_STACK;
  const numFont  = pokerMode ? RYE_STACK   : INTER_STACK;
  const preFont  = pokerMode ? CLEAN_STACK : INTER_STACK;   // poker ▲/▼ clean; plain +/- in Inter
  const mk = (txt, family, size, color, yc, weight) => {
    const t = document.createElementNS(SVGNS, 'text');
    t.setAttribute('class', 'chip-deco');
    t.setAttribute('x', cx); t.setAttribute('y', yc);
    t.setAttribute('text-anchor', 'middle'); t.setAttribute('dominant-baseline', 'central');
    t.setAttribute('font-family', family); t.setAttribute('font-size', size); t.setAttribute('fill', color);
    if(weight) t.setAttribute('font-weight', weight);
    t.textContent = txt;
    g.appendChild(t);
    return t;
  };
  // name — auto-fit to ~1.1r wide (inside the 0.6r face ring), capped in height
  const name = mk(person.name, nameFont, r * 0.30, groove, cy);
  const w = name.getComputedTextLength() || 1;
  name.setAttribute('font-size', Math.min(r * 0.30 * (r * 1.10) / w, r * 0.40));
  // emoji row above, $ pill below — only when present (the txn graph is name-only)
  if(person.emoji) mk(person.emoji, EMOJI_STACK, r * 0.20, groove, cy - r * 0.34);
  if(Number.isFinite(person.balance)){
    // prefix (▲/▼ or +/-) then the $number, as two tspans with a small gap between
    const s = moneySigned(person.balance), i = s.indexOf('$');
    const amt = mk('', numFont, r * 0.15, moneyColorOn(groove, person.balance), cy + r * 0.34, 'bold');
    const span = (txt, family, dx) => {
      if(!txt) return;
      const ts = document.createElementNS(SVGNS, 'tspan');
      ts.setAttribute('font-family', family);
      if(dx) ts.setAttribute('dx', dx);
      ts.textContent = txt;
      amt.appendChild(ts);
    };
    span(s.slice(0, i), preFont);                 // ▲/▼ (or +/-)
    span(s.slice(i), numFont);                    // $number
    const bb = amt.getBBox();                     // size the pill to the actual number
    const px = r * 0.08, py = r * 0.02;
    const rect = document.createElementNS(SVGNS, 'rect');
    rect.setAttribute('class', 'chip-deco');
    rect.setAttribute('x', bb.x - px); rect.setAttribute('y', bb.y - py);
    rect.setAttribute('width', bb.width + 2 * px); rect.setAttribute('height', bb.height + 2 * py);
    rect.setAttribute('rx', (bb.height + 2 * py) / 2);
    rect.setAttribute('fill', groove);
    g.insertBefore(rect, amt);                    // pill behind the number
  }
}

// Make each chip draggable. Graphviz emits a static SVG, so we move the node's <g>
// with a translate and re-draw the edges it touches as straight arrows (path +
// arrowhead polygon + label). Offsets live only in this SVG — a re-render (dataset/
// poker toggle) lays everything back out from scratch. A press without movement is
// treated as a click → selectPerson (keeps click-to-highlight working).
function enableNodeDrag(svg){
  const gGraph = svg.select('g.graph');
  if(gGraph.empty()) return;
  const root = gGraph.node();
  const nameOf = g => { const t = g.querySelector('title'); return t ? t.textContent : null; };

  // index nodes by their graphviz name, with a live drag offset (ox,oy)
  const nodes = new Map();
  svg.selectAll('g.node').each(function(){
    const ell = this.querySelector('ellipse'); if(!ell) return;
    nodes.set(nameOf(this), { g:this, cx:+ell.getAttribute('cx'), cy:+ell.getAttribute('cy'),
                              r:+ell.getAttribute('rx'), ox:0, oy:0 });
  });
  const center = nm => { const n = nodes.get(nm); return n ? {x:n.cx+n.ox, y:n.cy+n.oy, r:n.r} : null; };

  // Give the chips room to be rearranged: pad the viewBox by ~1.5 radii on every
  // side (the drawing just scales down a touch to fit), then clamp drags so a whole
  // chip can never leave that padded box. All node coords + drag offsets + the
  // pointer (via d3.pointer on g.graph) live in g.graph's local space, so we map the
  // padded viewBox rect back into that space and clamp each center to [min+r,max-r].
  const maxR = Math.max(1, ...[...nodes.values()].map(n => n.r));
  const vb = (svg.attr('viewBox') || '').split(/[\s,]+/).map(Number);
  let bounds = null;
  if(vb.length === 4 && vb.every(v => !isNaN(v))){
    const m = maxR * 0.5;
    const ev = [vb[0]-m, vb[1]-m, vb[2]+2*m, vb[3]+2*m];
    svg.attr('viewBox', ev.join(' '));
    const ctm = root.getCTM();                       // g.graph local -> viewBox space
    if(ctm){
      const inv = ctm.inverse();
      const corners = [[ev[0],ev[1]],[ev[0]+ev[2],ev[1]],[ev[0],ev[1]+ev[3]],[ev[0]+ev[2],ev[1]+ev[3]]]
        .map(([x,y]) => new DOMPoint(x,y).matrixTransform(inv));
      bounds = { minX:Math.min(...corners.map(p=>p.x)), maxX:Math.max(...corners.map(p=>p.x)),
                 minY:Math.min(...corners.map(p=>p.y)), maxY:Math.max(...corners.map(p=>p.y)) };
    }
  }
  const clampOffset = n => {
    if(!bounds) return;
    const pad = n.r + 4;                             // keep the full circle (incl. stroke) inside
    const cx = Math.min(Math.max(n.cx+n.ox, bounds.minX+pad), bounds.maxX-pad);
    const cy = Math.min(Math.max(n.cy+n.oy, bounds.minY+pad), bounds.maxY-pad);
    n.ox = cx - n.cx; n.oy = cy - n.cy;
  };

  // index edges + adjacency (edge title is "from->to")
  const edges = [], adj = new Map();
  const pushAdj = (k,e) => { (adj.get(k) || adj.set(k,[]).get(k)).push(e); };
  svg.selectAll('g.edge').each(function(){
    const t = nameOf(this); if(!t) return;
    const i = t.indexOf('->'); if(i < 0) return;
    const e = { from:t.slice(0,i), to:t.slice(i+2), path:this.querySelector('path'),
                arrow:this.querySelector('polygon'), labels:Array.from(this.querySelectorAll('text')) };
    if(!e.path) return;                         // skip invisible ($0-anchor) edges
    edges.push(e); pushAdj(e.from, e); pushAdj(e.to, e);
  });

  const updateEdge = e => {
    const s = center(e.from), t = center(e.to); if(!s || !t) return;
    let dx = t.x-s.x, dy = t.y-s.y; const len = Math.hypot(dx,dy) || 1;
    const ux = dx/len, uy = dy/len, px = -uy, py = ux;          // unit dir + perpendicular
    const arrow = Math.max(10, t.r * 0.16);                     // arrowhead scales with chip size
    const x1 = s.x+ux*s.r, y1 = s.y+uy*s.r;                     // start at source rim
    const tipX = t.x-ux*t.r, tipY = t.y-uy*t.r;                 // arrow tip at target rim
    const bX = tipX-ux*arrow, bY = tipY-uy*arrow;               // arrowhead base
    e.path.setAttribute('d', `M${x1},${y1}L${bX},${bY}`);
    if(e.arrow) e.arrow.setAttribute('points',
      `${bX+px*arrow*0.5},${bY+py*arrow*0.5} ${bX-px*arrow*0.5},${bY-py*arrow*0.5} ${tipX},${tipY}`);
    const mx = (x1+tipX)/2, my = (y1+tipY)/2;                   // label near the midpoint
    e.labels.forEach(tn => { tn.setAttribute('x', mx); tn.setAttribute('y', my-3); });
  };

  const drag = d3.drag()
    .on('start', function(event){
      this.__nm = nameOf(this); const n = nodes.get(this.__nm);
      this.__moved = false; this.__p0 = d3.pointer(event, root); this.__o0 = {ox:n.ox, oy:n.oy};
      d3.select(this).raise().style('cursor', 'grabbing');
    })
    .on('drag', function(event){
      const p = d3.pointer(event, root);
      const dx = p[0]-this.__p0[0], dy = p[1]-this.__p0[1];
      if(Math.abs(dx) > 2 || Math.abs(dy) > 2) this.__moved = true;
      const n = nodes.get(this.__nm); n.ox = this.__o0.ox+dx; n.oy = this.__o0.oy+dy;
      clampOffset(n);
      this.setAttribute('transform', `translate(${n.ox},${n.oy})`);
      (adj.get(this.__nm) || []).forEach(updateEdge);
    })
    .on('end', function(){
      d3.select(this).style('cursor', 'grab');
      if(this.__moved) return;
      const p = graphNodes.find(x => x.nodeId === this.getAttribute('id'));
      if(p) selectPerson(p.nodeId);
    });
  svg.selectAll('g.node').style('cursor', 'grab').call(drag);
}

function selectPerson(nodeId){
  activeNode = (activeNode === nodeId) ? null : nodeId;
  highlightTable();
  applyGraphSelection();
}

// Highlight the selected node, its incoming/outgoing edges and connected
// vertices; dim everything else.
function applyGraphSelection(){
  const graph = document.getElementById('graph');
  if(!graph) return;
  d3.selectAll('#graph g.node, #graph g.edge').classed('keep', false).classed('hl', false);

  const sel = activeNode && graphNodes.find(p => p.nodeId === activeNode);
  // no selection, or the selected person isn't in the graph ($0) -> don't dim
  if(!sel || !document.getElementById(activeNode)){ graph.classList.remove('selecting'); return; }
  graph.classList.add('selecting');

  const keepNodes = new Set([activeNode]);
  currentTransfers.forEach((t, i) => {
    if(t.from !== sel.name && t.to !== sel.name) return;
    const otherName = t.from === sel.name ? t.to : t.from;
    const other = graphNodes.find(p => p.name === otherName);
    if(other) keepNodes.add(other.nodeId);
    d3.select('#edge-' + i).classed('keep', true);
  });
  d3.selectAll('#graph g.node').each(function(){
    const id = this.getAttribute('id');
    d3.select(this).classed('keep', keepNodes.has(id)).classed('hl', id === activeNode);
  });
}

function clearSelection(){
  if(!activeNode) return;
  activeNode = null;
  highlightTable();
  applyGraphSelection();
}

// Green/red signed whole-dollar cell (Balance / IOUs / Average columns).
function signedCell(v){
  if(v == null) return '';
  const c = Math.abs(v) <= EPS ? 'text-secondary' : (v < 0 ? 'text-danger' : 'text-success');
  return `<span class="fw-bold ${c}">${moneySignedCell(v)}</span>`;
}

// Bootstrap Table: init once, then load rows per dataset.
function initBalTable(){
  $('#balTable').bootstrapTable({
    classes: 'table align-middle m-0',
    columns: [
      { field: 'rank', title: '#', align: 'center', valign: 'middle', sortable: true, class: 'text-secondary' },
      { field: 'name', title: 'Name', sortable: true,
        formatter: (v, row) =>
          `<span class="badge" style="background-color:${row.color};color:${textOn(row.color)}">${escapeHtml(v)}</span>${row.medal ? ' ' + row.medal : ''}` },
      { field: 'amount', title: 'Balance', align: 'right', valign: 'middle', sortable: true,
        sorter: (a, b) => a - b, formatter: signedCell },
      // IOUs = what's still outstanding after the settlement ledger; shown only for
      // the All Time column when a ledger exists (see renderTable)
      { field: 'iou', title: 'IOUs', align: 'right', valign: 'middle', sortable: true, visible: false,
        sorter: (a, b) => a - b, formatter: signedCell },
      // Average = balance ÷ times seen; shown only for the All Time column (see renderTable)
      { field: 'average', title: 'Average', align: 'right', valign: 'middle', sortable: true, visible: false,
        sorter: (a, b) => a - b, formatter: signedCell }
    ],
    sortName: 'amount', sortOrder: 'desc',
    rowAttributes: row => ({ 'data-node': row.nodeId }),
    onClickRow: row => selectPerson(row.nodeId),
    onPostBody: highlightTable    // re-apply selection after every (re)render / sort
  });
}

// Rank medal for the balances table: 🥇 #1, 🥈 #2, 💩 last (poker-only, via the
// shared rankEmoji gate). people is sorted by balance desc, so the row index = rank.
const tableMedal = (rank, count) => rankEmoji(rank, count, '🥇');

// Medals earned per person in one dated column (name -> medal char). Mirrors how
// showDataset builds `people`: present people only, sorted by balance desc.
function columnMedals(colIdx){
  const list = [];
  rawPeople.forEach(rp => { const v = rp.values[colIdx]; if(v != null) list.push({ name: rp.name, balance: v }); });
  list.sort((a, b) => b.balance - a.balance);
  const m = new Map();
  list.forEach((p, i) => { const md = tableMedal(i, list.length); if(md) m.set(p.name, md); });
  return m;
}

// Render a bag of medal chars in 🥇→🥈→💩 order as count-prefixed tokens — "3 🥇"
// (a single medal stays bare, no "1"). Each token is a nowrap span so a wrapping
// Name cell can never split a count from the medal it belongs to.
const MEDAL_ORDER = ['🥇', '🥈', '💩'];
function medalString(arr){
  const counts = {};
  for(const m of arr) counts[m] = (counts[m] || 0) + 1;
  return MEDAL_ORDER.filter(k => counts[k])
    .map(k => `<span class="text-nowrap">${counts[k] > 1 ? counts[k] + ' ' : ''}${k}</span>`)
    .join(' ');
}

// All medals each person accumulated across the dated columns (every dataset with a
// source col — i.e. not the virtual All Time).
function accumulatedMedals(){
  const acc = new Map();   // name -> [medal chars]
  datasets.forEach((d, ci) => {
    if(d.col === undefined) return;
    for(const [name, md] of columnMedals(ci)){
      if(!acc.has(name)) acc.set(name, []);
      acc.get(name).push(md);
    }
  });
  const out = new Map();
  for(const [name, arr] of acc) out.set(name, medalString(arr));
  return out;
}

// How many dated columns this person actually appears in (non-empty cell).
function seenCount(rawIdx){
  let n = 0;
  datasets.forEach((d, i) => { if(d.col !== undefined && rawPeople[rawIdx].values[i] != null) n++; });
  return n;
}

function renderTable(){
  const label = datasets[selectedDataset] ? datasets[selectedDataset].label : '';
  const n = people.length;
  // All Time accumulates medals from every dated column + shows an IOUs column
  // (what's still outstanding after the ledger) and an Average column (balance ÷
  // times seen); dated columns get their own 🥇/🥈/💩. Medals, crown and the
  // Average column are poker-mode features (the rankEmoji gate already empties
  // medals when off) — off means a plain ledger sorted by balance (so All Time
  // behaves like any dated column).
  const isAllTime = label === 'All Time';
  const showAverage = isAllTime && pokerMode;
  const showIou = isAllTime && transactions.length > 0;
  const acc = isAllTime ? accumulatedMedals() : null;

  // Averages (computed once) + the top average gets a 👑 (suffixed first). All Time
  // is sorted by average desc, so its # rank follows average order too.
  let avg = null, crowned = new Set(), rankByName = null;
  if(showAverage){
    avg = new Map(people.map(p => { const s = seenCount(p.idx); return [p.name, s ? p.balance / s : 0]; }));
    if(people.length >= 2){
      const max = Math.max(...avg.values());
      people.forEach(p => { if(avg.get(p.name) === max) crowned.add(p.name); });
    }
    const order = [...people].sort((a, b) => avg.get(b.name) - avg.get(a.name));
    rankByName = new Map(order.map((p, i) => [p.name, i + 1]));
  }

  const rows = people.map((p, i) => {
    let medal = '';
    if(isAllTime){
      medal = acc.get(p.name) || '';
      if(crowned.has(p.name)) medal = '👑' + (medal ? ' ' + medal : '');   // crowned is empty unless poker
    }else medal = tableMedal(i, n);
    const row = { rank: showAverage ? rankByName.get(p.name) : i + 1,
      name: p.name, amount: p.balance, color: p.color, nodeId: p.nodeId, medal };
    if(showIou) row.iou = rawPeople[p.idx].iou;
    if(showAverage) row.average = avg.get(p.name);
    return row;
  });
  $('#balTable').bootstrapTable('load', rows);
  $('#balTable').bootstrapTable(showIou ? 'showColumn' : 'hideColumn', 'iou');
  $('#balTable').bootstrapTable(showAverage ? 'showColumn' : 'hideColumn', 'average');
  $('#balTable').bootstrapTable('sortBy', showAverage
    ? { field: 'average', sortOrder: 'desc' } : { field: 'amount', sortOrder: 'desc' });
  document.getElementById('tableCard').classList.remove('d-none');
}

// Best-effort sort key for a ledger date string. Handles ISO / M-D-Y via native
// Date.parse, plus the spreadsheet's "D-Mon" / "Mon-D" (+ optional year) form.
// Unparseable -> -Infinity (sorts last when newest-first).
const MONTHS = { jan:0, feb:1, mar:2, apr:3, may:4, jun:5, jul:6, aug:7, sep:8, oct:9, nov:10, dec:11 };
function txnDateKey(s){
  if(!s) return -Infinity;
  s = String(s).trim();
  const native = Date.parse(s);
  if(!isNaN(native)) return native;
  let day = null, mon = null, year = 2000;
  for(const p of s.split(/[-/\s.]+/).filter(Boolean)){
    const m = p.toLowerCase().slice(0, 3);
    if(m in MONTHS) mon = MONTHS[m];
    else if(/^\d{4}$/.test(p)) year = +p;
    else if(/^\d{1,2}$/.test(p)){ if(day === null) day = +p; else year = 2000 + +p; }
  }
  return (mon === null || day === null) ? -Infinity : new Date(year, mon, day).getTime();
}

    ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

  el.className = 'alert ' + cls;

/* ===================== MAIN ===================== */
// Fetch + render a sheet. No URL params — the sheet is currentSheetUrl() (a saved
// localStorage override, else the hardcoded SHEET_URL default).
// Stale-while-revalidate: render the cached copy instantly, then fetch fresh in
// the background and re-render only if the CSV actually changed.
async function load(db){
  people = [];
  activeNode = null;
  document.getElementById('settleCard').classList.add('d-none');

  // point the Input tab's Open button + preview and the title link at the sheet
  document.getElementById('dbOpen').href = db;
  document.getElementById('appTitle').href = db;
  document.getElementById('srcFrame').src = db;

  const csvUrl  = toCsvUrl(db);
  const csvKey  = 'iou_csv:' + csvUrl;
  let cached = null;
  try { cached = localStorage.getItem(csvKey); } catch(e) {}

  // title: show cached name instantly, then refresh in the background
  const titleKey = 'iou_title:' + db;
  let cachedTitle = null;
  try { cachedTitle = localStorage.getItem(titleKey); } catch(e) {}
  setTitle(cachedTitle);
  fetchSheetTitle(db).then(t => {
    if(t){ setTitle(t); try { localStorage.setItem(titleKey, t); } catch(e) {} }
  });

  // 1) instant render from cache (if any)
  let shownFromCache = false;
  if(cached) shownFromCache = applyCsv(cached);
  else setStatus('info', 'Loading sheet…');

  // 2) revalidate against the live sheet
  let fresh;
  try{
    fresh = await fetchSheetCsv(csvUrl);
  }catch(e){
    if(shownFromCache) return;   // keep the cached view; ignore transient network errors
    const fileHint = location.protocol === 'file:'
      ? ' You are opening this file directly (file://), which browsers block from fetching. ' +
        'Serve it over http — e.g. <code>python3 -m http.server</code> then open ' +
        '<code>http://localhost:8000/</code> — or use the deployed GitHub Pages URL.'
      : ' Make sure the sheet is published to the web, then hit <em>Update</em> in the <em>Input</em> tab.';
    setStatus('error', 'Could not load the sheet (' + escapeHtml(e.message) + ').' + fileHint);
    document.getElementById('tableCard').classList.remove('d-none');
    showTab('tab-input');
    return;
  }

  // 3) re-render only if the content changed
  if(fresh !== cached){
    try { localStorage.setItem(csvKey, fresh); } catch(e) {}
    applyCsv(fresh);
  }
}

// Parse CSV text into datasets + people and render. Returns false if no usable rows.
function applyCsv(text){
  const rows = Papa.parse(text, { skipEmptyLines: true }).data;

  // The sheet may stack two tables (blank separators already dropped by
  // skipEmptyLines): a balances block on top, then a settlement ledger whose
  // header is "From, To, Date, Amount". Split at that header if present.
  const isLedgerHeader = r =>
    String((r && r[0]) || '').trim().toLowerCase() === 'from' &&
    String((r && r[1]) || '').trim().toLowerCase() === 'to';
  const ledgerAt = rows.findIndex(isLedgerHeader);
  const balanceRows = ledgerAt >= 0 ? rows.slice(0, ledgerAt) : rows;
  const ledgerRows  = ledgerAt >= 0 ? rows.slice(ledgerAt + 1) : [];

  // Column 0 = name. Each later column with a header label is a selectable
  // dated dataset (e.g. dated snapshots like "9-Jun").
  const header = balanceRows[0] || [];
  const ds = [];
  for(let c = 1; c < header.length; c++){
    const lbl = (header[c] == null ? '' : String(header[c])).trim();
    if(lbl) ds.push({ label: lbl, col: c });
  }
  let dataRows = balanceRows.slice(1);
  if(!ds.length){                  // no header labels (old format): single column
    ds.push({ label: 'Balance', col: 1 });
    dataRows = balanceRows;
  }

  // One person per row, value per dated dataset column. A number (incl. explicit
  // 0 = "played, evened out") means present; an EMPTY cell means absent that
  // column and is stored as null so it can be hidden. Rows with no data anywhere,
  // and nameless / Total rows, are skipped.
  const rp = [];
  for(const r of dataRows){
    const name = (r[0] == null ? '' : String(r[0])).trim();
    if(!name || name.toLowerCase() === 'total') continue;
    const values = ds.map(d => { const v = parseAmount(r[d.col]); return isNaN(v) ? null : round2(v); });
    if(values.every(v => v === null)) continue;
    rp.push({ name, values });
  }

  if(!rp.length){
    setStatus('error', 'No <code>name, balance</code> rows found in the sheet. Expected the first column to be a name and later columns to be balances.');
    return false;
  }

  // Parse the ledger (if any) into {from, to, date, amount}.
  const txns = [];
  for(const r of ledgerRows){
    const from = (r[0] == null ? '' : String(r[0])).trim();
    const to   = (r[1] == null ? '' : String(r[1])).trim();
    const amount = parseAmount(r[3]);
    if(!from || !to || isNaN(amount)) continue;
    txns.push({ from, to, date: (r[2] == null ? '' : String(r[2])).trim(), amount: round2(amount) });
  }

  // When a ledger exists, prepend one virtual dataset — "All Time" (base owed,
  // = sum of the dated columns) — unshifted onto every value array so the
  // index-based showDataset() needs no changes. Each person also gets an `iou`
  // (All Time after applying the ledger: payer +amount, payee -amount = what's
  // still outstanding), shown as the IOUs column of the All Time table.
  if(txns.length){
    // a name only in the ledger (not in any dated column) still gets a row
    for(const t of txns) for(const nm of [t.from, t.to]){
      if(!rp.some(p => p.name === nm)) rp.push({ name: nm, values: ds.map(() => null) });
    }
    const allTime = new Map(rp.map(p => [p.name, p.values.reduce((s, v) => s + (v || 0), 0)]));
    const current = new Map(allTime);
    for(const t of txns){
      if(current.has(t.from)) current.set(t.from, current.get(t.from) + t.amount);
      if(current.has(t.to))   current.set(t.to,   current.get(t.to)   - t.amount);
    }
    for(const p of rp){ p.values.unshift(round2(allTime.get(p.name))); p.iou = round2(current.get(p.name)); }
    ds.unshift({ label: 'All Time' });
  }

  datasets = ds;
  rawPeople = rp;
  transactions = txns;
  if(selectedDataset >= datasets.length) selectedDataset = 0;   // keep the user's column if possible
  // default to "All Time" until the user picks a pill themselves
  if(!userPicked){
    const at = datasets.findIndex(d => d.label === 'All Time');
    selectedDataset = at >= 0 ? at : 0;
  }
  renderDatasetToggle();
  renderTxnTable();
  showDataset(selectedDataset);
  return true;
}

// Build `people` from the chosen column, then render the table + graph.
function showDataset(idx){
  selectedDataset = idx;
  activeNode = null;
  // only people present (non-empty cell) in this column; color/nodeId keyed by the
  // stable rawPeople index so colors are consistent across columns
  people = [];
  rawPeople.forEach((rp, i) => {
    const v = rp.values[idx];
    if(v == null) return;   // absent this column -> don't show
    people.push({ name: rp.name, balance: v, idx: i, color: colorFor(i), nodeId: 'node-' + i, emoji: '' });
  });
  // sort highest balance first, then tag each node with rank + magnitude emojis
  people.sort((a, b) => b.balance - a.balance);
  const pot = totalPot();
  people.forEach((p, i) => { p.emoji = emojiFor(p.balance, pot, i, people.length); });
  markActiveDataset(idx);

  renderTable();
  const net = people.reduce((a, p) => a + p.balance, 0);
  if(Math.abs(net) > EPS){
    setStatus('error', `"${escapeHtml(datasets[idx].label)}" balances don't net to $0 — ` +
      `off by <strong>${money(net)}</strong>. Fix the sheet so every dollar is accounted for.`);
    document.getElementById('settleCard').classList.add('d-none');
    return;
  }
  setStatus('', '');
  showGraphCard();
  renderBalGraph();
}

// Reveal the Transfers graph card — but NEVER while the Input tab is active (the
// graph is irrelevant there, and re-renders, e.g. toggling poker mode, must not pop
// it back open).
function showGraphCard(){
  if(document.getElementById('tab-input').classList.contains('active')) return;
  document.getElementById('settleCard').classList.remove('d-none');
}

// Settlement graph for the selected balances column (Constraints 1-3).
function renderBalGraph(){
  if(!people.length) return;
  // mirror showDataset's guard: a non-net-zero column has no settlement graph
  if(Math.abs(people.reduce((a, p) => a + p.balance, 0)) > EPS){
    document.getElementById('settleCard').classList.add('d-none');
    return;
  }
  activeNode = null;
  graphMode = 'balances';
  graphNodes = people;
  document.getElementById('netToggleWrap').classList.replace('d-flex', 'd-none');
  showGraphCard();
  renderGraph(computeTransfers(people).transfers);
}

// Raw transfer-ledger graph: no settlement algorithm. Sum the ledger per directed
// (from, to) pair. net=false keeps both directions (<=2 edges per pair); net=true
// collapses each pair to a single edge in the surplus direction (A->B minus B->A),
// always positive from->to. $0 edges omitted. (A dense all-pairs graph is fine.)
function txnGraphData(net){
  const names = [...new Set(transactions.flatMap(t => [t.from, t.to]))];
  const nodes = names.map(name => ({
    name, color: colorForName(name), emoji: '',
    nodeId: 'node-' + rawPeople.findIndex(p => p.name === name)
  }));
  const dir = new Map();                        // from + NUL + to -> {from, to, amount}
  for(const t of transactions){
    const k = t.from + '\u0000' + t.to;       // NUL can't appear in a name
    const e = dir.get(k) || { from: t.from, to: t.to, amount: 0 };
    e.amount += t.amount;
    dir.set(k, e);
  }
  let edges;
  if(net){
    edges = [];
    const done = new Set();
    for(const [k, e] of dir){
      if(done.has(k)) continue;
      const revK = e.to + '\u0000' + e.from;
      done.add(k); done.add(revK);
      const rev = dir.get(revK);
      const amt = e.amount - (rev ? rev.amount : 0);
      if(Math.abs(amt) <= EPS) continue;        // evened out -> no edge
      edges.push(amt > 0 ? { from: e.from, to: e.to, amount: amt }
                         : { from: e.to, to: e.from, amount: -amt });
    }
  }else{
    edges = [...dir.values()].filter(e => Math.abs(e.amount) > EPS).map(e => ({ ...e }));
  }
  edges.sort((a, b) => b.amount - a.amount);
  return { nodes, edges };
}

function renderTxnGraph(){
  if(!transactions.length) return;
  activeNode = null;
  graphMode = 'txn';
  document.getElementById('netToggleWrap').classList.replace('d-none', 'd-flex');
  const { nodes, edges } = txnGraphData(txnNet);
  graphNodes = nodes;
  showGraphCard();
  renderGraph(edges);
}

const MAX_DATED_PILLS = 5;   // dated pills before the rest collapse into "More …"

function renderDatasetToggle(){
  const el = document.getElementById('dsToggle');
  el.innerHTML = '';
  el.classList.toggle('d-none', datasets.length <= 1);   // no toggle for a single column

  const pick = i => () => { userPicked = true; showDataset(i); };

  // the computed All Time column first, as a standalone CTA pill
  datasets.forEach((d, i) => {
    if(d.col !== undefined) return;
    const b = document.createElement('button');
    b.type = 'button';
    b.dataset.ds = i;
    b.className = 'btn rounded-pill btn-outline-secondary fw-semibold';
    b.textContent = d.label;
    b.addEventListener('click', pick(i));
    el.appendChild(b);
  });

  // dated columns rightmost-first as a Bootstrap btn-group. On mobile (< md) the
  // group sits below the full-width All Time pill as ONE horizontally scrollable
  // line showing every date; on desktop pills past MAX_DATED_PILLS collapse into a
  // nested "More" dropdown instead (so those pills are mobile-only, and the
  // dropdown is desktop-only).
  const dated = datasets.map((d, i) => i).filter(i => datasets[i].col !== undefined).reverse();
  if(!dated.length) return;
  const overflow = dated.length > MAX_DATED_PILLS ? dated.slice(MAX_DATED_PILLS) : [];

  const group = document.createElement('div');
  group.className = 'btn-group';
  group.setAttribute('role', 'group');
  dated.forEach((i, k) => {
    const b = document.createElement('button');
    b.type = 'button';
    b.dataset.ds = i;
    b.className = 'btn btn-outline-secondary text-nowrap flex-shrink-0';
    if(k >= MAX_DATED_PILLS) b.classList.add('d-md-none');
    b.textContent = datasets[i].label;
    b.addEventListener('click', pick(i));
    group.appendChild(b);
  });

  if(overflow.length){
    const sub = document.createElement('div');
    sub.className = 'btn-group d-none d-md-flex';
    sub.id = 'dsMore';
    sub.setAttribute('role', 'group');
    const tgl = document.createElement('button');
    tgl.type = 'button';
    tgl.className = 'btn btn-outline-secondary dropdown-toggle';
    tgl.setAttribute('data-bs-toggle', 'dropdown');
    tgl.setAttribute('aria-expanded', 'false');
    tgl.textContent = 'More';
    const menu = document.createElement('ul');
    menu.className = 'dropdown-menu dropdown-menu-end';
    overflow.forEach(i => {
      const it = document.createElement('button');
      it.type = 'button';
      it.dataset.ds = i;
      it.className = 'dropdown-item';
      it.textContent = datasets[i].label;
      it.addEventListener('click', pick(i));
      const li = document.createElement('li');
      li.appendChild(it);
      menu.appendChild(li);
    });
    sub.append(tgl, menu);
    group.appendChild(sub);
  }
  el.appendChild(group);
}

// Highlight the selected dataset across the pills + the "More" dropdown.
function markActiveDataset(idx){
  document.querySelectorAll('#dsToggle [data-ds]').forEach(b => {
    const on = +b.dataset.ds === idx;
    if(b.classList.contains('dropdown-item')) b.classList.toggle('active', on);
    else { b.classList.toggle('btn-primary', on); b.classList.toggle('btn-outline-secondary', !on); }
  });
  const more = document.getElementById('dsMore');
  if(more){
    const sel = more.querySelector(`.dropdown-item[data-ds="${idx}"]`);
    const tgl = more.querySelector('.dropdown-toggle');
    tgl.classList.toggle('btn-primary', !!sel);
    tgl.classList.toggle('btn-outline-secondary', !sel);
    tgl.textContent = sel ? datasets[idx].label : 'More';   // show the picked one on the toggle
  }
}

function main(){
  initBalTable();
  initTxnTable();
  // clicking empty space in the graph (not a node) clears the selection
  document.getElementById('graph').addEventListener('click', e => {
    if(!e.target.closest('g.node')) clearSelection();
  });
  // the Transfers graph follows the active tab: Balances -> settlement graph,
  // Transactions -> raw transfer-ledger graph
  document.getElementById('tab-bal').addEventListener('shown.bs.tab', renderBalGraph);
  document.getElementById('tab-txn').addEventListener('shown.bs.tab', renderTxnGraph);
  // the Transfers graph is irrelevant on the Input tab — hide it there (the bal/txn
  // tabs re-render and re-show it when you switch back)
  document.getElementById('tab-input').addEventListener('shown.bs.tab',
    () => document.getElementById('settleCard').classList.add('d-none'));
  // Net toggle re-renders the (transactions) graph: net vs both-directions
  document.getElementById('netToggle').addEventListener('change', e => {
    txnNet = e.target.checked;
    if(graphMode === 'txn') renderTxnGraph();
  });
  // poker-mode switch: flip poker mode and stick the choice (so a later sheet-title
  // refresh won't override the user's explicit pick)
  document.getElementById('pokerToggle').addEventListener('change', e => {
    pokerUserSet = true;
    setPokerMode(e.target.checked);
  });
  // Update: prompt for a sheet URL (pre-filled with the current one — the saved
  // localStorage URL or the hardcoded default), save the entry to localStorage, then
  // load it and jump back to Balances. Cancel or an empty entry leaves things as-is.
  document.getElementById('dbUpdate').addEventListener('click', () => {
    const next = prompt('Google Sheet URL (published to the web):', currentSheetUrl());
    if(next === null) return;                          // Cancel
    const url = next.trim();
    if(!url) return;                                   // empty -> ignore
    try { localStorage.setItem(STORE_KEY, url); } catch(e) {}
    showTab('tab-bal');
    load(url);
  });
  load(currentSheetUrl());
}

main();
</script>
</body>
</html>
